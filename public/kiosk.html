<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Check-In | RCELLFEST </title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --neon-blue: #00f0ff;
            --bg-dark: #050914;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #1a153a 0%, var(--bg-dark) 70%);
            color: #fff;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            user-select: none;
        }

        .glow-bg {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.15) 0%, transparent 60%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .kiosk-panel {
            background: rgba(13, 17, 33, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        h3.subtitle { color: #8fa0c1; font-weight: 500; letter-spacing: 4px; font-size: 1rem; margin-bottom: 10px; }
        h1.title { 
            font-weight: 900; 
            font-size: 2.2rem; 
            background: linear-gradient(90deg, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* Styling Kotak Kamera */
        #reader {
            width: 100%;
            max-width: 350px;
            margin: 0 auto 20px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            background: #000;
        }

        .sponsor-bar {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        .sponsor-text { font-size: 0.75rem; color: #6b7280; letter-spacing: 2px; margin-bottom: 8px; }
        .s-name { font-weight: 700; font-size: 0.9rem; color: #cbd5e1; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="glow-bg"></div>

    <div class="kiosk-panel">
        <h3 class="subtitle">GATE CHECK-IN MANDIRI</h3>
        <h1 class="title">RCELLFEST 17 FEST X INTERAKSI</h1>
        
        <div id="reader"></div>
        
        <h3 class="fw-bold" style="letter-spacing: 1px;">SCAN E-TIKET ANDA</h3>
        <p style="color: #8fa0c1; font-size: 1rem;">Arahkan kode QR ke arah kamera perangkat</p>
    </div>

    <div class="sponsor-bar">
        <div class="sponsor-text">OFFICIAL PARTNERS</div>
        <div>
            <span class="s-name">TELKOMSEL</span> &bull; 
            <span class="s-name">INFOKONSER</span> &bull; 
            <span class="s-name">ATLANTIC SPACE</span>
        </div>
    </div>

    <script>
        let isProcessing = false;
        let html5QrCode;

        // Inisialisasi Kamera saat halaman dimuat
        window.onload = () => {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            // Otomatis minta izin dan nyalakan kamera belakang (environment)
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                Swal.fire('Error Kamera', 'Gagal mengakses kamera. Pastikan izin kamera sudah diberikan di browser Anda.', 'error');
            });
        };

        // Fungsi yang berjalan saat QR berhasil terbaca oleh kamera
        function onScanSuccess(decodedText, decodedResult) {
            if (isProcessing) return; // Cegah scan dobel
            
            // Jeda sementara kamera biar nggak nge-scan terus-terusan
            html5QrCode.pause(); 
            processTicket(decodedText);
        }

        async function processTicket(code) {
            isProcessing = true;
            
            Swal.fire({
                title: 'MEMVERIFIKASI...',
                html: 'Menyinkronkan data dengan server pusat',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() },
                background: 'rgba(13, 17, 33, 0.9)',
                color: '#fff',
                customClass: { popup: 'border border-secondary rounded-4' }
            });

            try {
                const response = await fetch('/api/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticketCode: code })
                });
                
                const result = await response.json();

                if (result.valid) {
                    Swal.fire({
                        icon: 'success',
                        title: 'AKSES DITERIMA',
                        html: `<h2 class="fw-bold" style="color: #00f0ff;">${result.data.name}</h2>
                               <p style="color: #8fa0c1;">${result.data.event}</p>`,
                        showConfirmButton: false,
                        timer: 3500,
                        background: 'rgba(13, 17, 33, 0.95)',
                        color: '#fff',
                        iconColor: '#00f0ff'
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'AKSES DITOLAK',
                        html: `<h4 class="text-danger fw-bold mt-2">${result.message}</h4>
                               <p class="text-white-50">${result.detail}</p>`,
                        showConfirmButton: false,
                        timer: 4000,
                        background: 'rgba(30, 5, 10, 0.95)',
                        color: '#fff',
                        iconColor: '#ff2a2a'
                    });
                }
            } catch (error) {
                Swal.fire({
                    icon: 'warning',
                    title: 'KONEKSI TERPUTUS',
                    text: 'Gagal terhubung ke server utama.',
                    timer: 2500,
                    showConfirmButton: false,
                    background: 'rgba(13, 17, 33, 0.95)',
                    color: '#fff'
                });
            } finally {
                // Lanjutkan kembali kamera setelah pop-up hilang
                setTimeout(() => { 
                    isProcessing = false; 
                    html5QrCode.resume(); 
                }, 4000);
            }
        }
    </script>
</body>
</html>
