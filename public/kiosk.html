<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Check-In | RCELLFEST</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
<link rel="icon" href="https://i.ibb.co.com/W4LQdgGQ/IMG-1283.png" type="image/png">

    <style>
        :root {
            --neon-blue: #00f0ff;
            --bg-dark: #050914;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #1a153a 0%, var(--bg-dark) 70%);
            color: #fff;
            /* 👇 UBAH 2 BARIS INI 👇 */
            min-height: 100vh; 
            overflow-y: auto; 
            /* 👆 ---------------- 👆 */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            user-select: none;
        }

        .glow-bg {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.15) 0%, transparent 60%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .kiosk-panel {
            background: rgba(13, 17, 33, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            margin: 50px 0 20px 0;
        }

        h3.subtitle { color: #8fa0c1; font-weight: 500; letter-spacing: 4px; font-size: 1rem; margin-bottom: 10px; }
        h1.title { 
            font-weight: 900; 
            font-size: 2.2rem; 
            background: linear-gradient(90deg, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        #reader {
            width: 100%;
            max-width: 350px;
            margin: 0 auto 20px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            background: #000;
        }

        .sponsor-bar {
position: relative; /* 👈 Ubah dari absolute jadi relative */
            margin-top: 30px;   /* 👈 Tambahkan jarak atas */
            margin-bottom: 30px; /* 👈 Tambahkan jarak bawah */
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        .sponsor-text { font-size: 0.75rem; color: #6b7280; letter-spacing: 2px; margin-bottom: 8px; }
        .s-name { font-weight: 700; font-size: 0.9rem; color: #cbd5e1; margin: 0 10px; }
    </style>
</head>
<body>
    <div class="glow-bg"></div>

    <div class="kiosk-panel">
        <h3 class="subtitle">GATE CHECK-IN MANDIRI</h3>
        
        <h1 class="title" id="eventTitle">MEMUAT EVENT...</h1>
        
        <div id="reader"></div>
        
<h3 class="fw-bold" id="scanTitle" style="letter-spacing: 1px;">SCAN E-TIKET ANDA</h3>
<p style="color: #8fa0c1; font-size: 1rem;" id="scanDesc">Arahkan kode QR ke arah kamera perangkat</p>
    </div>

    <div class="sponsor-bar">
        <div class="sponsor-text">OFFICIAL PARTNERS</div>
        <div>
            <span class="s-name">TELKOMSEL</span> &bull; 
            <span class="s-name">INFOKONSER</span> &bull; 
            <span class="s-name">DAN MASIH BANYAK LAGI</span>
        </div>
    </div>

<script>
    let isProcessing = false;
    let html5QrCode;
    let currentEventId = null;

    const urlParams = new URLSearchParams(window.location.search);
    const urlEventId = urlParams.get('id');

    async function loadEventName() {
        const titleElement = document.getElementById('eventTitle');
        const readerDiv = document.getElementById('reader');
        const scanTitle = document.getElementById('scanTitle');
        const scanDesc = document.getElementById('scanDesc');

        try {
            if (urlEventId) {
                // Jika URL punya ID (aman dari Keycloak), langsung pakai
                const res = await fetch(`/api/events/${urlEventId}`);
                if (!res.ok) throw new Error("Gagal memuat data dari database");
                const data = await res.json();
                
                currentEventId = data._id;
                titleElement.innerHTML = `${data.name}<br><span style="font-size: 1.3rem; font-weight: 500; color:#fff;">BY: ${data.organizer || 'RCELLFEST'}</span>`;
                startScanner();
            } else {
                // 👇 JIKA ID HILANG/KOSONG, TAMPILKAN TOMBOL PILIHAN! 👇
                const res = await fetch('/api/events');
                const data = await res.json();
                
                if (data.length === 0) {
                    titleElement.innerText = "BELUM ADA EVENT AKTIF";
                    return;
                }

                // Sembunyikan kamera dulu
                readerDiv.style.display = 'none';
                scanTitle.style.display = 'none';
                scanDesc.style.display = 'none';

                // Tampilkan daftar tombol
                let htmlButtons = `<div class="mt-3"><h5 style="color: #8fa0c1; margin-bottom: 20px;">PILIH EVENT UNTUK MESIN INI:</h5>`;
                data.forEach(ev => {
                    htmlButtons += `<button onclick="pilihEvent('${ev._id}', '${ev.name}', '${ev.organizer || 'RCELLFEST'}')" 
                                    style="display: block; width: 100%; margin-bottom: 15px; padding: 15px; background: rgba(0, 240, 255, 0.1); border: 1px solid var(--neon-blue); color: #fff; border-radius: 15px; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: 0.3s;">
                                    ${ev.name}
                                    </button>`;
                });
                htmlButtons += `</div>`;
                titleElement.innerHTML = htmlButtons;
            }
        } catch (error) {
            console.error("Error:", error);
            titleElement.innerText = "EVENT TIDAK DITEMUKAN";
        }
    }

    // Fungsi saat staf mengklik tombol event di layar
    window.pilihEvent = function(id, name, organizer) {
        currentEventId = id;
        
        // Ubah URL di atas secara diam-diam (Biar kalau di-refresh ga hilang)
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?id=' + id;
        window.history.pushState({path:newUrl}, '', newUrl);

        // Kembalikan tampilan kamera
        document.getElementById('eventTitle').innerHTML = `${name}<br><span style="font-size: 1.3rem; font-weight: 500; color:#fff;">BY: ${organizer}</span>`;
        document.getElementById('reader').style.display = 'block';
        document.getElementById('scanTitle').style.display = 'block';
        document.getElementById('scanDesc').style.display = 'block';

        startScanner(); // Nyalakan kamera
    }

    function startScanner() {
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => {
            Swal.fire('Error Kamera', 'Gagal mengakses kamera perangkat.', 'error');
        });
    }

    window.onload = () => { loadEventName(); };

    function onScanSuccess(decodedText, decodedResult) {
        if (isProcessing) return;
        html5QrCode.pause(); 
        processTicket(decodedText);
    }

    async function processTicket(code) {
        isProcessing = true;
        
        Swal.fire({
            title: 'MEMVERIFIKASI...',
            html: 'Menyinkronkan data dengan server pusat',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading() },
            background: 'rgba(13, 17, 33, 0.9)',
            color: '#fff',
            customClass: { popup: 'border border-secondary rounded-4' }
        });

        try {
            const response = await fetch('/api/validate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ticketCode: code, eventId: currentEventId }) 
            });
            
            const result = await response.json();

            if (result.valid) {
                Swal.fire({
                    icon: 'success',
                    title: 'AKSES DITERIMA',
                    html: `<h2 class="fw-bold" style="color: #00f0ff;">${result.data.name}</h2>
                           <p style="color: #8fa0c1;">${result.data.event}</p>`,
                    showConfirmButton: false,
                    timer: 3500,
                    background: 'rgba(13, 17, 33, 0.95)',
                    color: '#fff',
                    iconColor: '#00f0ff'
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'AKSES DITOLAK',
                    html: `<h4 class="text-danger fw-bold mt-2">${result.message}</h4>
                           <p class="text-white-50">${result.detail}</p>`,
                    showConfirmButton: false,
                    timer: 4000,
                    background: 'rgba(30, 5, 10, 0.95)',
                    color: '#fff',
                    iconColor: '#ff2a2a'
                });
            }
        } catch (error) {
            Swal.fire({
                icon: 'warning',
                title: 'KONEKSI TERPUTUS',
                text: 'Gagal terhubung ke server utama.',
                timer: 2500,
                showConfirmButton: false,
                background: 'rgba(13, 17, 33, 0.95)',
                color: '#fff'
            });
        } finally {
            setTimeout(() => { 
                isProcessing = false; 
                html5QrCode.resume(); 
            }, 4000);
        }
    }
</script>
</body>
</html>
