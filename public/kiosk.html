<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Check-In | RCELLFEST 17</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-purple: #8a2be2;
            --bg-dark: #050914;
        }

        body {
            /* Background gradien gelap ala konser */
            background: radial-gradient(circle at 50% 0%, #1a153a 0%, var(--bg-dark) 70%);
            color: #fff;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            user-select: none;
        }

        /* Ornamen Cahaya di belakang */
        .glow-bg {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.15) 0%, transparent 60%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        /* Panel Kaca (Glassmorphism) */
        .kiosk-panel {
            background: rgba(13, 17, 33, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 50px 40px;
            width: 90%;
            max-width: 700px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        h3.subtitle { color: #8fa0c1; font-weight: 500; letter-spacing: 4px; font-size: 1rem; margin-bottom: 10px; }
        h1.title { 
            font-weight: 900; 
            font-size: 2.8rem; 
            background: linear-gradient(90deg, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* --- ANIMASI SCANNER VIEWFINDER --- */
        .scanner-window {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 40px auto;
            background: rgba(0, 240, 255, 0.03);
            border-radius: 20px;
            box-shadow: inset 0 0 30px rgba(0, 240, 255, 0.1);
        }

        /* Sudut-sudut Target Kamera */
        .scanner-window::before, .scanner-window::after,
        .scanner-window span::before, .scanner-window span::after {
            content: ''; position: absolute; width: 40px; height: 40px; 
            border-color: var(--neon-blue); border-style: solid;
        }
        .scanner-window::before { top: 0; left: 0; border-width: 4px 0 0 4px; border-radius: 20px 0 0 0; }
        .scanner-window::after { top: 0; right: 0; border-width: 4px 4px 0 0; border-radius: 0 20px 0 0; }
        .scanner-window span::before { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-radius: 0 0 0 20px; }
        .scanner-window span::after { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-radius: 0 0 20px 0; }

        /* Garis Laser Animasi */
        .laser-line {
            position: absolute;
            width: 90%;
            height: 3px;
            background: var(--neon-blue);
            left: 5%;
            box-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-blue);
            animation: scan 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes scan {
            0% { top: 5%; opacity: 0; }
            10% { opacity: 1; }
            50% { top: 50%; opacity: 1; transform: scale(1.05); }
            90% { opacity: 1; }
            100% { top: 95%; opacity: 0; }
        }

        .qr-placeholder { font-size: 5rem; color: rgba(255,255,255,0.1); line-height: 260px; }

        /* Footer Sponsor */
        .sponsor-bar {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        .sponsor-text { font-size: 0.75rem; color: #6b7280; letter-spacing: 2px; margin-bottom: 8px; }
        .sponsor-logos { display: flex; justify-content: center; align-items: center; gap: 20px; opacity: 0.7; }
        .s-name { font-weight: 700; font-size: 1rem; color: #cbd5e1; }
        
        #scannerInput { position: absolute; opacity: 0; top: -1000px; }
    </style>
</head>
<body onclick="keepFocus()">
    <div class="glow-bg"></div>

    <div class="kiosk-panel">
        <h3 class="subtitle">GATE CHECK-IN MANDIRI</h3>
        <h1 class="title">RCELLFEST 17 FEST<br><span style="font-size: 1.5rem; font-weight: 500; color:#fff;">X INTERAKSI SPACE</span></h1>
        
        <div class="scanner-window">
            <span></span>
            <div class="laser-line"></div>
            <i class="bi bi-qr-code qr-placeholder"></i>
        </div>
        
        <h2 class="fw-bold mt-2" style="font-size: 1.8rem; letter-spacing: 1px;">SCAN E-TIKET ANDA</h2>
        <p style="color: #8fa0c1; font-size: 1.1rem; margin-top: 10px;">Arahkan kode QR pada layar HP Anda ke arah alat pemindai</p>
    </div>

    <div class="sponsor-bar">
        <div class="sponsor-text">OFFICIAL PARTNERS</div>
        <div class="sponsor-logos">
            <span class="s-name">TELKOMSEL</span> &bull; 
            <span class="s-name">INFOKONSER</span> &bull; 
            <span class="s-name">ATLANTIC SPACE COFFEE SHOP</span>
        </div>
    </div>

    <input type="text" id="scannerInput" autocomplete="off" autofocus>

    <script>
        const scannerInput = document.getElementById('scannerInput');
        let isProcessing = false;

        function keepFocus() { if (!isProcessing) scannerInput.focus(); }
        setInterval(keepFocus, 1000);

        scannerInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const ticketCode = scannerInput.value.trim();
                scannerInput.value = ''; 
                if (ticketCode !== '' && !isProcessing) processTicket(ticketCode);
            }
        });

        async function processTicket(code) {
            isProcessing = true;
            scannerInput.blur(); 
            
            // Loading UI Custom Premium
            Swal.fire({
                title: 'MEMVERIFIKASI...',
                html: 'Menyinkronkan data dengan server pusat',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() },
                background: 'rgba(13, 17, 33, 0.9)',
                backdrop: 'rgba(0,0,0,0.8)',
                color: '#fff',
                customClass: { popup: 'border border-secondary rounded-4' }
            });

            try {
                const response = await fetch('/api/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticketCode: code })
                });
                
                const result = await response.json();

                if (result.valid) {
                    Swal.fire({
                        icon: 'success',
                        title: 'AKSES DITERIMA',
                        html: `<h2 class="fw-bold" style="color: #00f0ff; text-transform: uppercase;">${result.data.name}</h2>
                               <p style="color: #8fa0c1; font-size: 1.1rem;">${result.data.event}</p>
                               <div class="mt-4 p-3 rounded" style="background: rgba(0, 240, 255, 0.1); border: 1px dashed #00f0ff;">
                                  <h5 class="m-0 fw-bold">SELAMAT MENIKMATI ACARA!</h5>
                               </div>`,
                        showConfirmButton: false,
                        timer: 3500,
                        background: 'rgba(13, 17, 33, 0.95)',
                        backdrop: 'rgba(0,0,0,0.85)',
                        color: '#fff',
                        iconColor: '#00f0ff',
                        customClass: { popup: 'rounded-4 border border-info' }
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'AKSES DITOLAK',
                        html: `<h4 class="text-danger fw-bold mt-2">${result.message}</h4>
                               <p class="text-white-50">${result.detail}</p>`,
                        showConfirmButton: false,
                        timer: 4000,
                        background: 'rgba(30, 5, 10, 0.95)',
                        backdrop: 'rgba(200,0,0,0.2)',
                        color: '#fff',
                        iconColor: '#ff2a2a',
                        customClass: { popup: 'rounded-4 border border-danger' }
                    });
                }
            } catch (error) {
                Swal.fire({
                    icon: 'warning',
                    title: 'KONEKSI TERPUTUS',
                    text: 'Gagal terhubung ke server utama.',
                    timer: 2500,
                    showConfirmButton: false,
                    background: 'rgba(13, 17, 33, 0.95)',
                    color: '#fff'
                });
            } finally {
                setTimeout(() => { isProcessing = false; keepFocus(); }, 4000);
            }
        }
    </script>
</body>
</html>
