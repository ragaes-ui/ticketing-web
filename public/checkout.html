<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checkout | RCELLFEST</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="SB-Mid-server-bJeyNsEecyuBT4Lm6KC55-zg"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        :root {
            --bg-body: #f8f9fa;
            --bg-nav: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --text-main: #1a1d21;
            --text-muted: #6c757d;
            --border-color: #e9ecef;
            --primary: #0049CC;
            --primary-light: rgba(0, 73, 204, 0.05);
            --shadow-color: rgba(0,0,0,0.05);
            --bg-section: #f1f3f5;
        }

        [data-theme="dark"] {
            --bg-body: #0b1120;
            --bg-nav: rgba(17, 24, 39, 0.8);
            --bg-card: #111827;
            --bg-input: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255,255,255,0.06); 
            --primary: #38bdf8;
            --primary-light: rgba(56, 189, 248, 0.1);
            --shadow-color: rgba(0,0,0,0.3);
            --bg-section: #080c14;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); padding-top: 90px; }
        .navbar { background-color: var(--bg-nav) !important; border-bottom: 1px solid var(--border-color); }
        .navbar-brand { font-weight: 800; color: var(--primary) !important; }

        .glass-panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px var(--shadow-color); margin-bottom: 20px; }
        
        .form-control { background-color: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 12px; padding: 12px 15px; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); background-color: var(--bg-input); color: var(--text-main); }
        .form-control:read-only { background-color: var(--border-color); opacity: 0.7; color: var(--text-muted); }

        .payment-card { border: 2px solid var(--border-color); border-radius: 16px; padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; background: var(--bg-card); margin-bottom: 12px; }
        .payment-card:hover { border-color: var(--primary); background: var(--primary-light); }
        .payment-card.selected { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 4px 15px var(--primary-light); }
        .payment-icon { font-size: 1.5rem; color: var(--primary); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: var(--bg-body); border-radius: 12px; }
        
        .btn-primary { background-color: var(--primary); border: none; border-radius: 12px; padding: 12px; font-weight: 600; color: white;}
        
        /* Swal Fix Dark Mode */
        .swal2-popup { border-radius: 20px !important; background: var(--bg-card) !important; color: var(--text-main) !important; border: 1px solid var(--border-color) !important; }
        .swal2-title, .swal2-html-container { color: var(--text-main) !important; }

        /* Jurus Dark Mode Pamungkas */
        [data-theme="dark"] .text-muted { color: #9ca3af !important; }
        [data-theme="dark"] .text-dark { color: #f3f4f6 !important; }
        [data-theme="dark"] .fw-bold { color: #f3f4f6 !important; }
        [data-theme="dark"] .form-control { color: #f3f4f6 !important; background-color: #1f2937 !important; border-color: #374151 !important; }
        [data-theme="dark"] .form-control:read-only { background-color: #111827 !important; color: #6b7280 !important; }
        [data-theme="dark"] .form-control::placeholder { color: #6b7280 !important; }
        [data-theme="dark"] .btn-outline-secondary { color: #f3f4f6 !important; border-color: #4b5563 !important; }
        [data-theme="dark"] .btn-outline-secondary:hover { background-color: #4b5563 !important; color: #fff !important; }
        [data-theme="dark"] .btn-secondary { background-color: #4b5563 !important; border-color: #4b5563 !important; color: #fff !important; }
        [data-theme="dark"] .text-primary { color: #38bdf8 !important; }
        [data-theme="dark"] span { color: inherit; }
    </style>
</head>
<body>

    <nav class="navbar fixed-top">
        <div class="container">
            <a class="navbar-brand text-decoration-none" href="javascript:history.back()">
                <i class="bi bi-arrow-left me-2"></i> Kembali
            </a>
            <div class="fw-bold text-muted d-none d-md-block">Secure Checkout <i class="bi bi-lock-fill"></i></div>
        </div>
    </nav>

    <div class="container pb-5">
        <h2 class="fw-bold mb-4">Selesaikan Pembayaran</h2>
        
        <div class="row g-4">
            <div class="col-lg-7">
                
                <div class="glass-panel">
                    <h5 class="fw-bold mb-3"><i class="bi bi-person-badge text-primary me-2"></i>Detail Pemesan</h5>
                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="small fw-bold text-muted mb-1">Nama Lengkap (Sesuai KTP)</label>
                            <input type="text" id="chkName" class="form-control" placeholder="Masukkan nama lengkap">
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-1">Email</label>
                            <input type="email" id="chkEmail" class="form-control" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="small fw-bold text-muted mb-1">No. WhatsApp</label>
                            <input type="tel" id="chkPhone" class="form-control" placeholder="0812xxxx">
                        </div>
                    </div>

                    <div class="mt-4">
                        <div class="g-recaptcha" data-sitekey="SITE_KEY_KAKAK_DISINI"></div>
                    </div>
                    </div>

                <div class="glass-panel">
                    <h5 class="fw-bold mb-3"><i class="bi bi-credit-card-2-front text-primary me-2"></i>Metode Pembayaran</h5>
                    
                    <div class="payment-card" id="paySaldo" onclick="selectPayment('saldo')">
                        <div class="payment-icon"><i class="bi bi-wallet2"></i></div>
                        <div>
                            <h6 class="mb-0 fw-bold">Potong Saldo RCELL</h6>
                            <p class="mb-0 small text-muted">Sisa Saldo: <span class="text-success fw-bold" id="txtSaldo">Rp 0</span></p>
                        </div>
                    </div>

                    <div class="payment-card" id="payMidtrans" onclick="selectPayment('midtrans')">
                        <div class="payment-icon"><i class="bi bi-qr-code-scan"></i></div>
                        <div>
                            <h6 class="mb-0 fw-bold">QRIS / E-Wallet / VA</h6>
                            <p class="mb-0 small text-muted">Otomatis & Instan</p>
                        </div>
                    </div>
                </div>

            </div>

            <div class="col-lg-5">
                <div class="glass-panel position-sticky" style="top: 100px;">
                    <h5 class="fw-bold mb-3 border-bottom pb-2">Ringkasan Pesanan</h5>
                    
                    <h6 class="fw-bold mb-1" id="sumEventName">Memuat...</h6>
                    <p class="text-muted small mb-3"><i class="bi bi-ticket-perforated"></i> Tipe: <span class="fw-bold text-primary" id="sumTierName">-</span></p>

                    <div class="d-flex justify-content-between align-items-center mb-3 p-3 rounded" style="background: var(--bg-section);">
                        <span class="fw-bold small">Jumlah Tiket:</span>
                        <div class="input-group" style="width: 130px;">
                            <button class="btn btn-outline-secondary btn-sm fw-bold" type="button" onclick="updateQty(-1)">-</button>
                            <input type="number" id="chkQty" class="form-control text-center px-1" value="1" onchange="manualUpdateQty(this.value)">
                            <button class="btn btn-outline-secondary btn-sm fw-bold" type="button" onclick="updateQty(1)">+</button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="input-group">
                            <input type="text" id="inputPromo" class="form-control text-uppercase" placeholder="Masukkan Kode Promo" style="font-size: 0.9rem;">
                            <button class="btn btn-secondary px-3 fw-bold" type="button" onclick="cekPromoLuar()" style="font-size: 0.9rem;">Cek</button>
                        </div>
                        <div id="promoStatus" class="small mt-2"></div>
                    </div>

                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted small">Harga Satuan</span>
                        <span class="fw-bold small" id="sumPrice">Rp 0</span>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-2 d-none" id="rowDiskon">
                        <span class="text-success small"><i class="bi bi-tags-fill me-1"></i> Diskon Promo</span>
                        <span class="fw-bold text-success small" id="sumDiskon">- Rp 0</span>
                    </div>

                    <hr>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="fw-bold">Total Tagihan</span>
                        <h3 class="fw-bold text-primary mb-0" id="sumTotal">Rp 0</h3>
                    </div>

                    <button class="btn btn-primary w-100 shadow" id="btnProses" onclick="prosesBayar()">
                        Bayar Sekarang <i class="bi bi-lock-fill ms-1"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // Variabel Global
        let userData = {}; 
        let checkoutData = {}; 
        let selectedPayment = null; 
        let qty = 1; 
        let kodePromoAktif = ""; 
        let diskonPromo = 0;

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);

            const userRaw = localStorage.getItem('userData');
            const checkoutRaw = localStorage.getItem('checkoutData');
            
            // Tendang ke halaman utama jika data tidak ada
            if (!userRaw || !checkoutRaw) {
                window.location.href = 'index.html';
                return;
            }

            userData = JSON.parse(userRaw); 
            checkoutData = JSON.parse(checkoutRaw);
            
            document.getElementById('chkName').value = userData.fullName || userData.username;
            document.getElementById('chkEmail').value = userData.email;
            document.getElementById('chkPhone').value = userData.phone || '';
            document.getElementById('txtSaldo').innerText = `Rp ${userData.saldo.toLocaleString('id-ID')}`;
            
            document.getElementById('sumEventName').innerText = checkoutData.eventName;
            document.getElementById('sumTierName').innerText = checkoutData.tierName;
            document.getElementById('sumPrice').innerText = `Rp ${checkoutData.price.toLocaleString('id-ID')}`;
            
            hitungTotal();
            
            // Ilusi URL
            window.history.replaceState(null, '', `detail.html?checkout=true&id=${checkoutData.eventId}`);
        });

        function manualUpdateQty(val) { 
            const max = checkoutData.availableSeats || 1; 
            let newQty = parseInt(val); 
            if (isNaN(newQty) || newQty < 1) newQty = 1; 
            if (newQty > max) newQty = max; 
            qty = newQty; 
            document.getElementById('chkQty').value = qty; 
            hitungTotal(); 
        }

        function updateQty(change) { 
            const max = checkoutData.availableSeats || 1; 
            let newQty = qty + change; 
            if (newQty >= 1 && newQty <= max) { 
                qty = newQty; 
                document.getElementById('chkQty').value = qty; 
                hitungTotal(); 
            } 
        }

        function hitungTotal() { 
            let total = (checkoutData.price * qty) - diskonPromo; 
            if(total < 0) total = 0; 
            document.getElementById('sumTotal').innerText = `Rp ${total.toLocaleString('id-ID')}`; 
        }

        async function cekPromoLuar() {
            const inputEl = document.getElementById('inputPromo'); 
            const statusEl = document.getElementById('promoStatus'); 
            const rowDiskon = document.getElementById('rowDiskon'); 
            const code = inputEl.value.trim();
            
            if(!code) return;
            statusEl.innerHTML = '<span class="text-info spinner-border spinner-border-sm me-1"></span> <span class="text-info small">Mengecek...</span>';
            
            try {
                const res = await fetch('/api/check-promo', { 
                    method: 'POST', 
                    headers: {'Content-Type':'application/json'}, 
                    body: JSON.stringify({ code: code }) 
                });
                const data = await res.json();
                
                if(data.valid) { 
                    kodePromoAktif = code.toUpperCase(); 
                    diskonPromo = data.discount; 
                    statusEl.innerHTML = `<span class="text-success fw-bold">✅ ${data.message}</span>`; 
                    document.getElementById('sumDiskon').innerText = `- Rp ${diskonPromo.toLocaleString('id-ID')}`; 
                    rowDiskon.classList.remove('d-none'); 
                } else { 
                    kodePromoAktif = ""; 
                    diskonPromo = 0; 
                    statusEl.innerHTML = `<span class="text-danger fw-bold">❌ ${data.message}</span>`; 
                    rowDiskon.classList.add('d-none'); 
                }
                hitungTotal();
            } catch(e) { 
                statusEl.innerHTML = '<span class="text-danger">Gagal mengecek promo.</span>'; 
            }
        }

        function selectPayment(method) { 
            selectedPayment = method; 
            document.getElementById('paySaldo').classList.remove('selected'); 
            document.getElementById('payMidtrans').classList.remove('selected'); 
            
            if (method === 'saldo') {
                document.getElementById('paySaldo').classList.add('selected'); 
            }
            if (method === 'midtrans') {
                document.getElementById('payMidtrans').classList.add('selected'); 
            }
        }

        async function prosesBayar() {
            const name = document.getElementById('chkName').value;
            const phone = document.getElementById('chkPhone').value;
            
            // 👇 VALIDASI TOKEN RECAPTCHA 👇
            const recaptchaToken = grecaptcha.getResponse();

            if (!name || !phone) {
                return Swal.fire('Data Belum Lengkap', 'Nama dan No. WhatsApp wajib diisi!', 'warning');
            }
            if (!recaptchaToken) {
                return Swal.fire('Verifikasi Gagal', 'Harap centang "Saya bukan robot" dari Google terlebih dahulu! 🤖', 'error');
            }
            if (!selectedPayment) {
                return Swal.fire('Pilih Pembayaran', 'Silakan pilih metode pembayaran terlebih dahulu.', 'warning');
            }

            let totalTagihan = (checkoutData.price * qty) - diskonPromo;
            if (totalTagihan < 0) totalTagihan = 0;
            
            const buyerPayload = { name: name, phone: phone, email: userData.email, qty: qty };

            // ==========================================
            // JIKA BAYAR PAKAI SALDO
            // ==========================================
            if (selectedPayment === 'saldo') {
                if (userData.saldo < totalTagihan) {
                    return Swal.fire('Saldo Kurang', 'Saldo RCELL kamu tidak mencukupi.', 'error');
                }

                const { value: pin } = await Swal.fire({
                    title: 'Konfirmasi PIN', 
                    html: `<input id="swal-input-pin" type="password" class="form-control text-center fw-bold fs-4" maxlength="6" style="letter-spacing: 10px; background:var(--bg-input); color:var(--text-main);" placeholder="******">`, 
                    showCancelButton: true, 
                    confirmButtonText: 'Bayar', 
                    confirmButtonColor: '#0049CC', 
                    background: 'var(--bg-card)', 
                    color: 'var(--text-main)',
                    preConfirm: () => document.getElementById('swal-input-pin').value
                });

                if (!pin || pin.length !== 6) {
                    return Swal.fire('Gagal', 'PIN harus 6 angka!', 'error');
                }

                Swal.fire({ title: 'Memproses tiket...', didOpen: () => Swal.showLoading(), background: 'var(--bg-card)', color: 'var(--text-main)' });
                
                try {
                    const res = await fetch('/api/buy-ticket', {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            userId: userData.id, 
                            eventId: checkoutData.eventId, 
                            tierName: checkoutData.tierName, 
                            price: (checkoutData.price * qty), 
                            quantity: qty, 
                            pin: pin, 
                            promoCode: kodePromoAktif, 
                            buyerData: buyerPayload,
                            recaptchaToken: recaptchaToken // Kirim token ke backend!
                        })
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok && data.success) { 
                        userData.saldo = data.sisaSaldo; 
                        localStorage.setItem('userData', JSON.stringify(userData)); 
                        localStorage.removeItem('checkoutData'); 
                        Swal.fire({ icon: 'success', title: 'Berhasil!', html: `Tiket: <b>${data.ticketCode}</b>`, background: 'var(--bg-card)', color: 'var(--text-main)' }).then(() => window.location.href = 'dashboard.html'); 
                    } else { 
                        Swal.fire('Gagal', data.message, 'error'); 
                        grecaptcha.reset(); // Reset captcha kalo error
                    } 
                } catch (err) { 
                    Swal.fire('Error', 'Koneksi terputus', 'error'); 
                    grecaptcha.reset(); 
                }

            // ==========================================
            // JIKA BAYAR PAKAI MIDTRANS
            // ==========================================
            } else if (selectedPayment === 'midtrans') {
                Swal.fire({ title: 'Menyiapkan Tagihan...', didOpen: () => Swal.showLoading(), background: 'var(--bg-card)', color: 'var(--text-main)' });
                
                try {
                    let hargaMidtrans = checkoutData.price; 
                    if (diskonPromo > 0) { 
                        hargaMidtrans = totalTagihan / qty; 
                    }
                    
                    const res = await fetch('/api/payment-token', { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ 
                            eventId: checkoutData.eventId, 
                            tierName: checkoutData.tierName, 
                            price: hargaMidtrans, 
                            quantity: qty, 
                            customerName: name, 
                            customerEmail: userData.email, 
                            customerPhone: phone, 
                            userId: userData.id,
                            recaptchaToken: recaptchaToken // Kirim token ke backend!
                        }) 
                    });
                    
                    const data = await res.json(); 
                    Swal.close(); 
                    
                    if (res.ok && data.token) { 
                        window.snap.pay(data.token, { 
                            onSuccess: async function(result){ 
                                Swal.fire({ title: 'Menerbitkan Tiket...', didOpen: () => Swal.showLoading(), background: 'var(--bg-card)', color: 'var(--text-main)' });
                                
                                const saveRes = await fetch('/api/midtrans-success', { 
                                    method: 'POST', 
                                    headers: { 'Content-Type': 'application/json' }, 
                                    body: JSON.stringify({ 
                                        eventId: checkoutData.eventId, 
                                        userId: userData.id, 
                                        customerName: name, 
                                        customerEmail: userData.email, 
                                        tierName: checkoutData.tierName, 
                                        price: totalTagihan, 
                                        quantity: qty, 
                                        orderId: data.orderId, 
                                        buyerData: buyerPayload 
                                    }) 
                                });
                                
                                const saveData = await saveRes.json();
                                if(saveData.success) { 
                                    localStorage.removeItem('checkoutData'); 
                                    Swal.fire({icon: 'success', title: 'Sukses!', text: 'Tiket terbit!', background: 'var(--bg-card)', color: 'var(--text-main)'}).then(() => window.location.href = 'dashboard.html'); 
                                }
                            },
                            onPending: function(result){ 
                                Swal.fire({icon: 'info', title: 'Menunggu Pembayaran', text: 'Silakan selesaikan pembayaran kamu.', background: 'var(--bg-card)', color: 'var(--text-main)'}); 
                                grecaptcha.reset(); 
                            },
                            onError: function(result){ 
                                Swal.fire({icon: 'error', title: 'Pembayaran Gagal', text: 'Terjadi kesalahan dari pihak bank.', background: 'var(--bg-card)', color: 'var(--text-main)'}); 
                                grecaptcha.reset(); 
                            },
                            onClose: function(){ 
                                Swal.fire({icon: 'warning', title: 'Dibatalkan', text: 'Kamu menutup halaman pembayaran.', background: 'var(--bg-card)', color: 'var(--text-main)'}); 
                                grecaptcha.reset(); 
                            }
                        }); 
                    } else { 
                        Swal.fire('Error', data.message, 'error'); 
                        grecaptcha.reset(); 
                    }
                } catch (err) { 
                    Swal.fire('Error', 'Gagal memuat gateway', 'error'); 
                    grecaptcha.reset(); 
                }
            }
        }
    </script>
</body>
</html>
