<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | RCELLFEST</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* --- RESET & BASIC VARIABLES --- */
        :root {
            --bg-dark: #09090b;
            --card-bg: #18181b;
            --input-bg: #27272a;
            --primary: #3b82f6; /* Biru Neon */
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            /* Gradasi statis (ringan) menggantikan animasi berat */
            background-image: radial-gradient(circle at top right, #1e3a8a 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #3b82f6 0%, transparent 30%);
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 20px;
        }

        /* --- CARD DESIGN (Fake Glass - Lebih Ringan) --- */
        .login-card {
            background-color: rgba(24, 24, 27, 0.95); /* Hampir solid, performa tinggi */
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- LOGO AREA --- */
        .brand-header { text-align: center; margin-bottom: 30px; }
        .logo-icon { 
            font-size: 3rem; 
            color: var(--primary); 
            text-shadow: 0 0 20px var(--primary-glow);
        }
        .brand-title { font-size: 1.5rem; font-weight: 700; margin-top: 10px; letter-spacing: 1px; }
        .brand-subtitle { font-size: 0.85rem; color: var(--text-muted); }

        /* --- FORMS --- */
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { 
            display: block; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            margin-bottom: 8px; 
            font-weight: 600;
        }
        
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid transparent;
            padding: 14px 14px 14px 45px; /* Space for icon */
            border-radius: 10px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }

        /* Efek Focus Ringan */
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: #202023;
        }

        /* --- BUTTONS --- */
        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

        /* --- FOOTER LINKS --- */
        .footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }
        .link-accent {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .back-link { display: block; margin-top: 15px; color: var(--text-muted); text-decoration: none; font-size: 0.8rem; }

        /* Utility */
        .d-none { display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-header">
            <i class="bi bi-robot logo-icon"></i>
            <div class="brand-title">RCELLFEST</div>
            <div class="brand-subtitle" id="subTitle">Silakan masuk ke akun Anda</div>
        </div>

        <form id="authForm">
            <div class="form-group">
                <label class="form-label" id="lblIdentifier">Email / Username</label>
                <div class="input-wrapper">
                    <i class="bi bi-person"></i>
                    <input type="text" id="identifier" class="form-control" placeholder="Ketik disini..." required>
                </div>
            </div>

            <div id="registerFields" class="d-none">
                <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <div class="input-wrapper">
                        <i class="bi bi-card-text"></i>
                        <input type="text" id="fullName" class="form-control" placeholder="Nama sesuai KTP">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Nomor WhatsApp</label>
                    <div class="input-wrapper">
                        <i class="bi bi-whatsapp"></i>
                        <input type="tel" id="phone" class="form-control" placeholder="08xxxxxxxx">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Aktif</label>
                    <div class="input-wrapper">
                        <i class="bi bi-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="nama@email.com">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-key"></i>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="btnSubmit">
                MASUK SEKARANG
            </button>
        </form>

        <div class="footer-links">
            <span id="textInfo">Belum punya akun?</span> 
            <span class="link-accent" onclick="toggleMode()">Buat Akun</span>
            
            <a href="index.html" class="back-link">
                <i class="bi bi-arrow-left"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        let isLogin = true;

        // Toast Ringan
        const Toast = Swal.mixin({
            toast: true,
            position: 'top',
            showConfirmButton: false,
            timer: 2500,
            background: '#18181b',
            color: '#fff',
            customClass: { popup: 'colored-toast' }
        });

        function toggleMode() {
            isLogin = !isLogin;
            const elements = {
                subTitle: document.getElementById('subTitle'),
                btn: document.getElementById('btnSubmit'),
                info: document.getElementById('textInfo'),
                link: document.querySelector('.link-accent'),
                regFields: document.getElementById('registerFields'),
                lblId: document.getElementById('lblIdentifier')
            };

            if (isLogin) {
                elements.subTitle.innerText = "Silakan masuk ke akun Anda";
                elements.btn.innerText = "MASUK SEKARANG";
                elements.info.innerText = "Belum punya akun?";
                elements.link.innerText = "Buat Akun";
                elements.regFields.classList.add('d-none');
                elements.lblId.innerText = "Email / Username";
                
                ['fullName', 'phone', 'email'].forEach(id => document.getElementById(id).removeAttribute('required'));
            } else {
                elements.subTitle.innerText = "Lengkapi data untuk mendaftar";
                elements.btn.innerText = "DAFTAR AKUN";
                elements.info.innerText = "Sudah punya akun?";
                elements.link.innerText = "Login Aja";
                elements.regFields.classList.remove('d-none');
                elements.lblId.innerText = "Username Unik";

                ['fullName', 'phone', 'email'].forEach(id => document.getElementById(id).setAttribute('required', 'true'));
            }
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const originalText = btn.innerText;
            
            // Loading State Sederhana
            btn.disabled = true;
            btn.innerText = "Memproses...";
            btn.style.opacity = "0.7";

            const getVal = (id) => document.getElementById(id).value;
            const payload = isLogin 
                ? { identifier: getVal('identifier'), password: getVal('password') }
                : { 
                    username: getVal('identifier'), 
                    email: getVal('email'), 
                    password: getVal('password'), 
                    fullName: getVal('fullName'), 
                    phone: getVal('phone'), 
                    role: 'user' 
                  };

            try {
                const res = await fetch(isLogin ? '/api/login' : '/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (data.success) {
                    if (isLogin) {
                        localStorage.setItem('userToken', data.token);
                        localStorage.setItem('userData', JSON.stringify(data.user));
                        Toast.fire({ icon: 'success', title: 'Login Berhasil' });
                        setTimeout(() => {
                             window.location.href = data.user.role === 'admin' ? 'admin.html' : 'index.html';
                        }, 1000);
                    } else {
                        Toast.fire({ icon: 'success', title: 'Registrasi Berhasil' });
                        toggleMode();
                    }
                } else {
                    Toast.fire({ icon: 'error', title: data.message || 'Gagal' });
                }
            } catch (err) {
                Toast.fire({ icon: 'warning', title: 'Cek koneksi internet Anda' });
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
                btn.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
