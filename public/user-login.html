<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | RCELLFEST</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='a' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%230049CC'/%3E%3Cstop offset='100%25' stop-color='%23007bff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='32' fill='url(%23a)'/%3E%3Cpath d='M21 18h8c5 0 9 3.5 9 8 0 3-1.8 5.7-4.5 7.2l5 8.8h-5l-4.2-7.5h-3.3v7.5h-5V18zm5 4v7h3c2.5 0 4.5-1.8 4.5-3.5S31.5 22 29 22h-3z' fill='white'/%3E%3Cpath d='M36 18h13v4h-8v6h7v4h-7v10h-5V18z' fill='white'/%3E%3C/svg%3E" type="image/svg+xml">

    <style>
        /* --- RESET & BASIC VARIABLES --- */
        :root {
            --bg-dark: #09090b;
            --card-bg: #18181b;
            --input-bg: #27272a;
            --primary: #3b82f6; 
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e3a8a 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #3b82f6 0%, transparent 30%);
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 20px;
        }

        /* --- CARD DESIGN --- */
        .login-card {
            background-color: rgba(24, 24, 27, 0.95); 
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- LOGO AREA --- */
        .brand-header { text-align: center; margin-bottom: 30px; }
        .logo-icon { 
            font-size: 3rem; 
            color: var(--primary); 
            text-shadow: 0 0 20px var(--primary-glow);
        }
        .brand-title { font-size: 1.5rem; font-weight: 700; margin-top: 10px; letter-spacing: 1px; }
        .brand-subtitle { font-size: 0.85rem; color: var(--text-muted); }

        /* --- FORMS --- */
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-label { 
            display: block; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            margin-bottom: 8px; 
            font-weight: 600;
        }
        
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid transparent;
            padding: 14px 14px 14px 45px; 
            border-radius: 10px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: #202023;
        }

        /* --- LUPA PASSWORD LINK --- */
        .forgot-pass {
            font-size: 0.75rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .forgot-pass:hover { text-decoration: underline; color: #60a5fa; }

        /* --- BUTTONS --- */
        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

        /* --- FOOTER LINKS --- */
        .footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }
        .link-accent {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .back-link { display: block; margin-top: 15px; color: var(--text-muted); text-decoration: none; font-size: 0.8rem; }

        /* Utility */
        .d-none { display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-header">
            <i class="bi bi-robot logo-icon"></i>
            <div class="brand-title">RCELLFEST</div>
            <div class="brand-subtitle" id="subTitle">Silakan masuk ke akun Anda</div>
        </div>

        <form id="authForm">
            <div class="form-group">
                <label class="form-label" id="lblIdentifier">Email / Username</label>
                <div class="input-wrapper">
                    <i class="bi bi-person"></i>
                    <input type="text" id="identifier" class="form-control" placeholder="Ketik disini..." required>
                </div>
            </div>

            <div id="registerFields" class="d-none">
                <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <div class="input-wrapper">
                        <i class="bi bi-card-text"></i>
                        <input type="text" id="fullName" class="form-control" placeholder="Nama sesuai KTP">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Nomor WhatsApp</label>
                    <div class="input-wrapper">
                        <i class="bi bi-whatsapp"></i>
                        <input type="tel" id="phone" class="form-control" placeholder="08xxxxxxxx">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Aktif</label>
                    <div class="input-wrapper">
                        <i class="bi bi-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="nama@email.com">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label class="form-label" style="margin-bottom: 0;">Password</label>
                    <a href="#" class="forgot-pass" id="forgotPassLink" onclick="resetPasswordFlow()">Lupa Password?</a>
                </div>
                <div class="input-wrapper">
                    <i class="bi bi-key"></i>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="btnSubmit">
                MASUK SEKARANG
            </button>
        </form>

        <div class="footer-links">
            <span id="textInfo">Belum punya akun?</span> 
            <span class="link-accent" onclick="toggleMode()">Buat Akun</span>
            
            <a href="index.html" class="back-link">
                <i class="bi bi-arrow-left"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        let isLogin = true;

        // Toast Ringan
        const Toast = Swal.mixin({
            toast: true,
            position: 'top',
            showConfirmButton: false,
            timer: 2500,
            background: '#18181b',
            color: '#fff',
            customClass: { popup: 'colored-toast' }
        });

        // Mode Switcher (Login / Register)
        function toggleMode() {
            isLogin = !isLogin;
            const elements = {
                subTitle: document.getElementById('subTitle'),
                btn: document.getElementById('btnSubmit'),
                info: document.getElementById('textInfo'),
                link: document.querySelector('.link-accent'),
                regFields: document.getElementById('registerFields'),
                lblId: document.getElementById('lblIdentifier'),
                forgotPass: document.getElementById('forgotPassLink') // Tangkap tombol lupa pass
            };

            if (isLogin) {
                elements.subTitle.innerText = "Silakan masuk ke akun Anda";
                elements.btn.innerText = "MASUK SEKARANG";
                elements.info.innerText = "Belum punya akun?";
                elements.link.innerText = "Buat Akun";
                elements.regFields.classList.add('d-none');
                elements.forgotPass.classList.remove('d-none'); // Tampilkan saat mode login
                elements.lblId.innerText = "Email / Username";
                
                ['fullName', 'phone', 'email'].forEach(id => document.getElementById(id).removeAttribute('required'));
            } else {
                elements.subTitle.innerText = "Lengkapi data untuk mendaftar";
                elements.btn.innerText = "DAFTAR AKUN";
                elements.info.innerText = "Sudah punya akun?";
                elements.link.innerText = "Login Aja";
                elements.regFields.classList.remove('d-none');
                elements.forgotPass.classList.add('d-none'); // Sembunyikan saat mode register
                elements.lblId.innerText = "Username Unik";

                ['fullName', 'phone', 'email'].forEach(id => document.getElementById(id).setAttribute('required', 'true'));
            }
        }

        // Fitur Lupa Password
        async function resetPasswordFlow() {
            // Tahap 1: Minta Username
            const { value: inputUsername } = await Swal.fire({
                title: 'Lupa Password',
                text: 'Masukkan Username Anda untuk mengatur ulang password.',
                input: 'text',
                inputPlaceholder: 'Username Anda',
                background: '#18181b',
                color: '#fff',
                showCancelButton: true,
                confirmButtonColor: '#3b82f6',
                cancelButtonColor: '#3f3f46',
                confirmButtonText: 'Lanjut',
                cancelButtonText: 'Batal',
                inputValidator: (value) => {
                    if (!value) return 'Username tidak boleh kosong!'
                }
            });

            if (inputUsername) {
                // Tahap 2: Minta Password Baru
                const { value: newPassword } = await Swal.fire({
                    title: 'Set Password Baru',
                    text: `Buat password baru untuk akun ${inputUsername}`,
                    input: 'password',
                    inputPlaceholder: '••••••••',
                    background: '#18181b',
                    color: '#fff',
                    showCancelButton: true,
                    confirmButtonColor: '#3b82f6',
                    cancelButtonColor: '#3f3f46',
                    confirmButtonText: 'Reset Password',
                    cancelButtonText: 'Batal',
                    inputValidator: (value) => {
                        if (!value || value.length < 6) return 'Password minimal 6 karakter!'
                    }
                });

                if (newPassword) {
                    // Tampilkan Loading
                    Swal.fire({
                        title: 'Memproses...',
                        background: '#18181b',
                        color: '#fff',
                        allowOutsideClick: false,
                        didOpen: () => { Swal.showLoading(); }
                    });

                    // Kirim ke Backend API
                    try {
                        const res = await fetch('/api/reset-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: inputUsername, newPassword: newPassword })
                        });
                        
                        const data = await res.json();

                        if (res.ok && data.success) {
                            Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Password berhasil diubah. Silakan Login.', background: '#18181b', color: '#fff' });
                        } else {
                            Swal.fire({ icon: 'error', title: 'Gagal', text: data.message || 'Username tidak ditemukan.', background: '#18181b', color: '#fff' });
                        }
                    } catch (err) {
                        Swal.fire({ icon: 'error', title: 'Error', text: 'Koneksi ke server gagal.', background: '#18181b', color: '#fff' });
                    }
                }
            }
        }

        // Handle Submit Form (Login/Register)
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const originalText = btn.innerText;
            
            btn.disabled = true;
            btn.innerText = "Memproses...";
            btn.style.opacity = "0.7";

            const getVal = (id) => document.getElementById(id).value;
            const payload = isLogin 
                ? { identifier: getVal('identifier'), password: getVal('password') }
                : { 
                    username: getVal('identifier'), 
                    email: getVal('email'), 
                    password: getVal('password'), 
                    fullName: getVal('fullName'), 
                    phone: getVal('phone'), 
                    role: 'user' 
                  };

            try {
                const res = await fetch(isLogin ? '/api/login' : '/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (data.success) {
                    if (isLogin) {
                        localStorage.setItem('userToken', data.token);
                        localStorage.setItem('userData', JSON.stringify(data.user));
                        Toast.fire({ icon: 'success', title: 'Login Berhasil' });
                        setTimeout(() => {
                             window.location.href = data.user.role === 'admin' ? 'admin.html' : 'index.html';
                        }, 1000);
                    } else {
                        Toast.fire({ icon: 'success', title: 'Registrasi Berhasil' });
                        toggleMode();
                    }
                } else {
                    Toast.fire({ icon: 'error', title: data.message || 'Gagal' });
                }
            } catch (err) {
                Toast.fire({ icon: 'warning', title: 'Cek koneksi internet Anda' });
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
                btn.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
