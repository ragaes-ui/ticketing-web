<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Penyelenggara Event | RCELLFEST</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8f9fa;
            --text-muted: #cbd5e1;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.05);
            --primary-gradient: linear-gradient(135deg, #10b981, #059669); /* Warna Hijau Khusus Partner */
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--bg-card);
            border: var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
        }

        .form-control {
            background: var(--input-bg);
            border: var(--glass-border);
            color: var(--text-main);
            border-radius: 12px;
            padding: 12px 15px;
        }
        
        .form-control:focus {
            background: var(--input-bg);
            color: var(--text-main);
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .btn-submit {
            background: var(--primary-gradient);
            border: none;
            color: white;
            border-radius: 50px;
            padding: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .btn-submit:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); color: white;}
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold mb-0" style="color: #10b981;"><i class="bi bi-briefcase-fill"></i> RCELLFEST PARTNER</h2>
            <p class="text-muted mt-2">Pendaftaran Akun Penyelenggara Event / Admin</p>
        </div>

        <form id="organizerRegisterForm">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Nama Instansi / Penyelenggara</label>
                <input type="text" id="regFullName" class="form-control" placeholder="Cth: BEM Fasilkom / Rcell Project" required>
            </div>
            
            <div class="row mb-3">
                <div class="col-6">
                    <label class="form-label text-muted small fw-bold">Username Login</label>
                    <input type="text" id="regUsername" class="form-control" placeholder="rcell_admin" required>
                </div>
                <div class="col-6">
                    <label class="form-label text-muted small fw-bold">WhatsApp PIC</label>
                    <input type="number" id="regPhone" class="form-control" placeholder="0812..." required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Email Bisnis</label>
                <input type="email" id="regEmail" class="form-control" placeholder="admin@event.com" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Buat Password Admin</label>
                <input type="password" id="regPassword" class="form-control" placeholder="Minimal 6 karakter" required minlength="6">
            </div>

            <button type="submit" id="btnRegisterOrg" class="btn btn-submit w-100"><i class="bi bi-person-plus-fill me-2"></i>Buat Akun Penyelenggara</button>
        </form>
    </div>

    <script>
        document.getElementById('organizerRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnRegisterOrg');
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Memproses...`;
            btn.disabled = true;

            const payload = {
                fullName: document.getElementById('regFullName').value,
                username: document.getElementById('regUsername').value,
                phone: document.getElementById('regPhone').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                
                // 👇 INI KUNCI UTAMANYA: Kita set role-nya jadi organizer 👇
                role: 'organizer' 
            };

            try {
                // Nembak ke API registrasi yang udah ada di server.js
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    Swal.fire({ 
                        icon: 'success', 
                        title: 'Registrasi Berhasil!', 
                        text: 'Akun Penyelenggara Event sudah aktif. Silakan login di halaman Admin.', 
                        background: '#1e293b', color: '#fff' 
                    }).then(() => {
                        // Arahkan ke halaman login admin kakak
                        window.location.href = 'login.html'; 
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'Gagal', text: data.message || data.error, background: '#1e293b', color: '#fff' });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Gagal terhubung ke server', background: '#1e293b', color: '#fff' });
            } finally {
                btn.innerHTML = '<i class="bi bi-person-plus-fill me-2"></i>Buat Akun Penyelenggara';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
