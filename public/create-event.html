<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Event | RCELLFEST</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='a' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%230049CC'/%3E%3Cstop offset='100%25' stop-color='%23007bff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='32' fill='url(%23a)'/%3E%3Cpath d='M21 18h8c5 0 9 3.5 9 8 0 3-1.8 5.7-4.5 7.2l5 8.8h-5l-4.2-7.5h-3.3v7.5h-5V18zm5 4v7h3c2.5 0 4.5-1.8 4.5-3.5S31.5 22 29 22h-3z' fill='white'/%3E%3Cpath d='M36 18h13v4h-8v6h7v4h-7v10h-5V18z' fill='white'/%3E%3C/svg%3E" type="image/svg+xml">

    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --bg-body: #f0f2f5;
            --bg-nav: #ffffff;
            --bg-card: #ffffff;
            --text-main: #333333;
            --text-muted: #6c757d;
            --border-color: #eef;
            --shadow-color: rgba(0, 73, 204, 0.08);
            --input-bg: #f8f9fa;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-nav: #1e293b;
            --bg-card: #1e293b;
            --text-main: #f8f9fa;
            --text-muted: #cbd5e1;
            --border-color: #334155;
            --shadow-color: rgba(0,0,0,0.5);
            --input-bg: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-top: 76px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Navbar Clean */
        .navbar {
            background-color: var(--bg-nav);
            box-shadow: 0 1px 10px rgba(0,0,0,0.05);
            padding: 12px 0;
            height: 76px;
            transition: background-color 0.3s;
        }
        .navbar-brand {
            font-weight: 800;
            color: #0049CC !important;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-link { font-weight: 500; color: var(--text-muted); margin: 0 10px; transition: 0.3s; }
        .nav-link:hover { color: #0049CC; font-weight: 700; }
        [data-theme="dark"] .nav-link { color: #cbd5e1; }
        [data-theme="dark"] .nav-link:hover { color: #60a5fa; }

        /* Form Container */
        .form-container {
            flex-grow: 1;
            padding: 40px 15px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        
        .glass-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 40px var(--shadow-color);
            border: 1px solid var(--border-color);
            transition: background-color 0.3s;
        }

        /* Custom Inputs */
        .form-label {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .form-control, .form-select {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 15px;
            border-radius: 12px;
            transition: 0.3s;
        }
        
        .form-control:focus, .form-select:focus {
            background-color: var(--input-bg);
            color: var(--text-main);
            border-color: #0049CC;
            box-shadow: 0 0 0 3px rgba(0, 73, 204, 0.2);
        }

        /* Footer */
        .footer-loket { background-color: #0e1e3b; color: white; padding: 50px 0 30px 0; font-size: 0.85rem; margin-top: auto; }
        .footer-head { font-weight: 700; margin-bottom: 15px; color: white; font-size: 0.95rem; }
        .footer-link { display: block; color: #b0c0d6; text-decoration: none; margin-bottom: 8px; transition: 0.2s; }
        .footer-link:hover { color: white; text-decoration: underline; }
        .social-btn {
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            display: inline-flex; align-items: center; justify-content: center;
            color: white; margin-right: 8px; text-decoration: none;
        }
        .social-btn:hover { background: white; color: #0e1e3b; }
    </style>
</head>
<body> <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-ticket-detailed-fill"></i> RCELLFEST
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav_explore">Jelajah</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html" data-i18n="nav_about">Tentang Kami</a></li>
                    <li class="nav-item"><a class="nav-link" href="guide.html" data-i18n="nav_guide">Panduan</a></li>
                </ul>
            </div>

            <div class="d-flex align-items-center gap-2">
                <button onclick="toggleLanguage()" class="btn btn-sm btn-outline-secondary rounded-pill fw-bold" style="min-width: 40px;" id="lang-btn">
                    ID
                </button>

                <button onclick="toggleTheme()" class="btn rounded-circle" id="theme-btn" style="width: 40px; height: 40px; border: 1px solid rgba(0,0,0,0.1);">
                    <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                </button>

                <div id="navUserArea">
                    </div>
            </div>
        </div>
    </nav>

<div class="form-container" id="mainFormArea" style="display: none;">
    <div class="glass-card">
            <h2 class="fw-bold mb-1 text-primary"><i class="bi bi-calendar2-plus-fill me-2"></i>Buat Event Baru</h2>
            <p class="text-muted mb-4">Tambahkan acara baru ke dalam sistem Rcellfest. Mode: Penyelenggara</p>

            <form id="createEventForm">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Nama Event <span class="text-danger">*</span></label>
                        <input type="text" id="evName" class="form-control" placeholder="Cth: Konser Sheila On 7" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Kategori <span class="text-danger">*</span></label>
                        <select id="evCategory" class="form-select" required>
                            <option value="Konser">Konser Musik</option>
                            <option value="Streaming">Akun Streaming</option>
                            <option value="Seminar">Seminar / Workshop</option>
                            <option value="Olahraga">Olahraga</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Tanggal Event <span class="text-danger">*</span></label>
                        <input type="date" id="evDate" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Lokasi / Venue <span class="text-danger">*</span></label>
                        <input type="text" id="evLocation" class="form-control" placeholder="Cth: GBK Senayan / Telegram" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Harga Tiket (Rp) <span class="text-danger">*</span></label>
                        <input type="number" id="evPrice" class="form-control" placeholder="Cth: 150000" min="0" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Kapasitas / Kuota <span class="text-danger">*</span></label>
                        <input type="number" id="evCapacity" class="form-control" placeholder="Cth: 500" min="1" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Deskripsi Event <small class="text-muted">(Jika streaming, taruh info akun di sini)</small></label>
                        <textarea id="evDescription" class="form-control" rows="4" placeholder="Jelaskan detail acara atau info kredensial di sini..."></textarea>
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" id="btnSubmitEvent" class="btn btn-primary w-100 py-3 fw-bold rounded-pill" style="background: linear-gradient(135deg, #0049CC, #0072ff); border: none;">
                            <i class="bi bi-rocket-takeoff-fill me-2"></i> Publikasikan Event
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <footer class="footer-loket">
        <div class="container">
            <div class="row g-4">
                <div class="col-lg-12 text-center">
                    <small class="text-white-50">&copy; 2026 RCELLTECH ID - Partner Portal</small>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // --- KAMUS BAHASA ---
        const translations = {
            id: {
                nav_explore: "Jelajah", nav_about: "Tentang Kami", nav_guide: "Panduan", nav_login: "Masuk / Daftar", nav_my_ticket: "Tiket Saya", nav_logout: "Keluar"
            },
            en: {
                nav_explore: "Explore", nav_about: "About Us", nav_guide: "Guide", nav_login: "Login / Register", nav_my_ticket: "My Tickets", nav_logout: "Logout"
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            // Jalankan proteksi keamanan dulu sebelum nampilin halaman
            checkSecurityAccess();

            // Init Settings
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);

            const savedLang = localStorage.getItem('lang') || 'id';
            updateLanguage(savedLang);
        });

// 👇 FUNGSI SATPAM (PROTEKSI AKSES) 👇
        function checkSecurityAccess() {
            const userRaw = localStorage.getItem('userData');
            
            // 1. Kalau belum login sama sekali -> LANGSUNG TENDANG KILAT (Tanpa Popup)
            if (!userRaw) {
                window.location.href = 'organizer-login.html';
                return;
            }

            const user = JSON.parse(userRaw);
            
            // 2. Kalau dia login, TAPI rolenya cuma 'user' biasa (atau belum punya role)
            if (!user.role || user.role === 'user') {
                Swal.fire({
                    icon: 'error', title: 'Akses Terlarang!', text: 'Halaman ini khusus untuk Penyelenggara Event.', confirmButtonColor: '#d33', background: '#1c1c2d', color: '#fff'
                }).then(() => { window.location.href = 'index.html'; });
                return;
            }

            // 3. Kalau dia lolos sensor (role = organizer / admin), TAMPILKAN FORM-NYA
            document.getElementById('mainFormArea').style.display = 'block';

            // Pasang navbar profile
            const lang = localStorage.getItem('lang') || 'id';
            const t = translations[lang];
            const navArea = document.getElementById('navUserArea');
            
            navArea.innerHTML = `
                <div class="dropdown">
                    <button class="btn btn-light dropdown-toggle d-flex align-items-center gap-2 border rounded-pill px-3 py-1" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-briefcase-fill text-success"></i> <span class="small fw-bold text-truncate" style="max-width:80px;">${user.username}</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 p-2 rounded-3">
                        <li><a class="dropdown-item rounded-2 small" href="dashboard.html">Dashboard Akun</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><button class="dropdown-item rounded-2 text-danger small" onclick="logout()">${t.nav_logout}</button></li>
                    </ul>
                </div>`;
        }

        function logout() { localStorage.removeItem('userData'); localStorage.removeItem('userToken'); window.location.href = 'index.html'; }

        // --- LANGUAGE & THEME LOGIC ---
        function toggleLanguage() {
            const currentLang = localStorage.getItem('lang') || 'id';
            const newLang = currentLang === 'id' ? 'en' : 'id';
            localStorage.setItem('lang', newLang);
            updateLanguage(newLang);
        }

        function updateLanguage(lang) {
            const t = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(t[key]) el.innerHTML = t[key];
            });
            const langBtn = document.getElementById('lang-btn');
            langBtn.innerText = lang.toUpperCase();
            if(lang === 'en') {
                langBtn.classList.add('btn-primary'); langBtn.classList.remove('btn-outline-secondary');
            } else {
                langBtn.classList.add('btn-outline-secondary'); langBtn.classList.remove('btn-primary');
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('theme-icon');
            const btn = document.getElementById('theme-btn');
            if (theme === 'dark') {
                icon.classList.remove('bi-moon-stars-fill'); icon.classList.add('bi-sun-fill');
                icon.style.color = "#FFD700"; btn.classList.add('btn-dark'); btn.classList.remove('btn-light');
            } else {
                icon.classList.remove('bi-sun-fill'); icon.classList.add('bi-moon-stars-fill');
                icon.style.color = ""; btn.classList.add('btn-light'); btn.classList.remove('btn-dark');
            }
        }

        // 👇 LOGIKA UNTUK SUBMIT EVENT KE DATABASE 👇
        document.getElementById('createEventForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Cegah halaman reload
            
            const btnSubmit = document.getElementById('btnSubmitEvent');
            const originalText = btnSubmit.innerHTML;
            
            // Ambil data dari form
            const name = document.getElementById('evName').value;
            const category = document.getElementById('evCategory').value;
            const date = document.getElementById('evDate').value;
            const location = document.getElementById('evLocation').value;
            const price = document.getElementById('evPrice').value;
            const capacity = document.getElementById('evCapacity').value;
            const description = document.getElementById('evDescription').value;

            // Konfirmasi sebelum membuat
            const confirmRes = await Swal.fire({
                title: 'Publikasikan Event?',
                text: "Pastikan semua data sudah benar sebelum dipublikasikan ke halaman utama.",
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#0049CC',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Ya, Publikasikan!',
                background: '#1c1c2d', color: '#fff'
            });

            if (!confirmRes.isConfirmed) return;

            // Loading state
            btnSubmit.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Menyimpan...`;
            btnSubmit.disabled = true;

            try {
                // Tembak ke API yang ada di server.js kakak
                const response = await fetch('/api/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        category: category,
                        date: date,
                        location: location,
                        price: Number(price),
                        capacity: Number(capacity),
                        description: description
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Event Berhasil Dibuat!',
                        text: 'Event kamu sekarang sudah muncul di halaman depan (Jelajah).',
                        confirmButtonColor: '#0049CC', background: '#1c1c2d', color: '#fff'
                    }).then(() => {
                        window.location.href = 'index.html'; // Pindah ke halaman depan
                    });
                } else {
                    Swal.fire({ icon: 'error', title: 'Gagal', text: result.error || 'Terjadi kesalahan sistem', background: '#1c1c2d', color: '#fff' });
                }

            } catch (error) {
                console.error(error);
                Swal.fire({ icon: 'error', title: 'Error', text: 'Gagal terhubung ke server.', background: '#1c1c2d', color: '#fff' });
            } finally {
                btnSubmit.innerHTML = originalText;
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
