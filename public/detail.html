<style>
        /* --- THEME VARIABLES (VERSI PERBAIKAN PREMIUM) --- */
        :root {
            --bg-body: #f8f9fa;
            --bg-nav: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #ffffff;
            --bg-section: #f1f3f5;
            --text-main: #1a1d21;
            --text-muted: #6c757d;
            --border-color: #e9ecef;
            --shadow-color: rgba(0,0,0,0.03);
            --primary: #0049CC;
            --primary-light: rgba(0, 73, 204, 0.05);
        }

        [data-theme="dark"] {
            --bg-body: #0b1120;
            --bg-nav: rgba(17, 24, 39, 0.8);
            --bg-card: #111827;
            --bg-input: #1f2937;
            --bg-section: #080c14;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(255,255,255,0.06); 
            --shadow-color: rgba(0,0,0,0.3);
            --primary: #38bdf8;
            --primary-light: rgba(56, 189, 248, 0.1);
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); padding-top: 76px; transition: background 0.3s, color 0.3s; -webkit-font-smoothing: antialiased; }
        
        .navbar { background-color: var(--bg-nav) !important; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); padding: 12px 0; height: 76px; transition: 0.3s; }
        .navbar-brand { font-weight: 800; color: var(--primary) !important; font-size: 1.4rem; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .nav-link { font-weight: 500; color: var(--text-muted); margin: 0 10px; }
        .nav-link:hover { color: var(--primary); }
        [data-theme="dark"] .nav-link { color: #e2e8f0; }

        /* Detail Layout */
        .event-hero { height: 350px; background-size: cover; background-position: center; border-radius: 24px; position: relative; margin-top: 20px; display: flex; align-items: flex-end; padding: 30px; color: white; box-shadow: 0 10px 30px var(--shadow-color); border: 1px solid var(--border-color); }
        .event-hero::before { content: ''; position: absolute; top:0; left:0; right:0; bottom:0; background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.85) 100%); border-radius: 24px; }
        .event-hero-content { position: relative; z-index: 2; width: 100%; }
        
        .glass-panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px; padding: 25px; box-shadow: 0 10px 25px var(--shadow-color); margin-bottom: 20px; transition: background 0.3s, border 0.3s; }
        .sticky-checkout { position: sticky; top: 100px; }
        
        .tier-label { cursor: pointer; transition: 0.2s; border: 1px solid var(--border-color); background-color: var(--bg-card); display: block; margin-bottom: 12px; border-radius: 16px !important; overflow: hidden; }
        .tier-label:hover { border-color: var(--primary); transform: translateY(-2px); }
        .tier-label input:checked + div { font-weight: bold; }
        .tier-label.selected { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 0 15px var(--primary-light); }
        .tier-sold-out { opacity: 0.4; cursor: not-allowed; background-color: var(--bg-section); border-style: dashed; }

        /* Payment Selector Swal */
        .payment-selector { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .payment-card { border: 2px solid var(--border-color); border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: all 0.2s ease; text-align: left; background: var(--bg-card); }
        .payment-card:hover, .payment-card.selected { border-color: var(--primary); background: var(--primary-light); }
        .payment-icon { font-size: 1.5rem; color: var(--primary); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--primary-light); border-radius: 10px; }
        
        /* SweetAlert2 Styling Fix untuk Dark Mode */
        .swal2-popup { border-radius: 24px !important; border: 1px solid var(--border-color) !important; background: var(--bg-card) !important; color: var(--text-main) !important; }
        .swal2-title { color: var(--text-main) !important; }
        .swal2-html-container { color: var(--text-main) !important; } 
        .swal2-html-container .text-muted { color: var(--text-muted) !important; }
        .swal2-html-container .form-control { color: var(--text-main) !important; background-color: var(--bg-input) !important; border: 1px solid var(--border-color) !important; border-radius: 10px !important; }
        .swal2-html-container .form-control:focus { border-color: var(--primary) !important; box-shadow: 0 0 0 3px var(--primary-light) !important; }
        .swal2-html-container .form-label { color: var(--text-muted) !important; }
    /* Efek Denyut untuk Badge Line Up */
        @keyframes pulse-badge {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 6px rgba(255, 193, 7, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 193, 7, 0); }
        }
        .badge-pulse {
            animation: pulse-badge 2s infinite;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">

                <i class="bi bi-arrow-left me-2"></i> RCELLFEST

                <button onclick="toggleTheme()" class="btn rounded-circle" id="theme-btn" style="width: 40px; height: 40px; border: 1px solid var(--border-color);"><i class="bi bi-moon-stars-fill" id="theme-icon"></i></button>
                <div id="navUserArea"></div>

<div id="breadcrumb-container" style="padding: 12px 0; border-bottom: 1px solid var(--border-color);"></div>
    <div class="container mt-5 pt-5 text-center" id="loadingDataContainer">
        <div class="spinner-border text-primary mt-5" style="width: 3rem; height: 3rem;" role="status"></div>
        <h4 class="mt-3 fw-bold" style="color: var(--text-muted);">Sedang Memuat Data Event...</h4>
        <p class="text-white-50 small">Mohon tunggu sebentar ya.</p>
    </div>
    <div class="container pb-5" id="mainContainer" style="display: none;">
        <div class="event-hero" id="eventHero">
            <div class="event-hero-content">
                <span class="badge bg-primary mb-2 px-3 py-2 rounded-pill" id="elCategory">General</span>
                <h1 class="fw-bold mb-2 text-white" id="elTitle" style="font-size: 2.5rem; line-height: 1.2;">Memuat Event...</h1>
<div class="d-flex flex-wrap gap-3 mt-3 text-light opacity-75 fw-500">
    <div><i class="bi bi-calendar-event me-1"></i> <span id="elDate">TBA</span></div>
    <div><i class="bi bi-clock-fill text-info me-1"></i> <span id="elTime">TBA</span></div>
    <div><i class="bi bi-geo-alt-fill text-danger me-1"></i> <span id="elVenue">TBA</span></div>
    <div><i class="bi bi-building-fill text-warning me-1"></i> <span id="elOrganizer">Penyelenggara TBA</span></div>
</div>
            </div>
        </div>

        <div class="row mt-4 g-4">
            <div class="col-lg-7">
                <div class="glass-panel h-100">
                    <h5 class="fw-bold mb-3 border-bottom pb-2">Deskripsi & Info Event</h5>
                    <p id="elDesc" style="white-space: pre-wrap; line-height: 1.8; color: var(--text-muted);"></p>
                </div>
                <div class="glass-panel mt-4" id="lineupSection" style="display: none;">
                    <h5 class="fw-bold mb-3 border-bottom pb-2"><i class="bi bi-stars text-warning me-2"></i>EXTRAORDINARY LINE UP</h5>
                    <div class="row g-3" id="lineupGrid">
                        </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="glass-panel sticky-checkout">
                    <h5 class="fw-bold mb-3">Pilih Tipe Tiket</h5>
                    
                    <div id="ticketTierSelection" class="mb-4">
                        <div class="text-center py-4"><div class="spinner-border text-primary"></div></div>
                    </div>

                    <div class="p-3 rounded-3 mt-2 d-flex justify-content-between align-items-center" style="background: var(--bg-section); border: 1px solid var(--border-color);">
                        <div>
                            <small class="text-muted d-block fw-bold">Total Harga</small>
                            <h3 class="fw-bold text-primary mb-0" id="totalPriceDisplay">Rp 0</h3>
                        </div>
                        <button id="btnBuy" class="btn btn-secondary btn-lg px-4 rounded-pill fw-bold" disabled>Pilih Tiket</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-5 pt-5 text-center" id="errorContainer" style="display: none;">
        <i class="bi bi-emoji-frown display-1 text-muted"></i>
        <h2 class="mt-3 fw-bold">Event Tidak Ditemukan</h2>
        <p class="text-muted">Mungkin URL salah atau event sudah dihapus.</p>
        <a href="/" class="btn btn-primary rounded-pill px-4 mt-3">Kembali ke Beranda</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        let currentEvent = null;
        let selectedTierObj = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Ambil data URL satu kali saja (biar nggak tabrakan)
            const urlParams = new URLSearchParams(window.location.search);
            
            // 2. PENANGKAP ILUSI CHECKOUT
            if (urlParams.get('checkout') === 'true') {
                window.location.replace(`/checkout?id=${urlParams.get('id')}`);
                return; 
            }

            // 3. Kodingan Asli Detail Event
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
            checkLoginStatus();

            const eventId = urlParams.get('id');

            if (!eventId) {
                showError();
                return;
            }

            await loadEventDetail(eventId);
        });

        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('theme-icon');
            if (theme === 'dark') { icon.className = 'bi bi-sun-fill text-warning'; } 
            else { icon.className = 'bi bi-moon-stars-fill'; }
        }

        function checkLoginStatus() {
            const userRaw = localStorage.getItem('userData');
            const navArea = document.getElementById('navUserArea');
            if (userRaw) {
                const user = JSON.parse(userRaw);
                navArea.innerHTML = `<a href="/dashboard" class="btn btn-outline-primary rounded-pill px-3 fw-bold btn-sm"><i class="bi bi-person-circle me-1"></i> ${user.username}</a>`;
            } else {
                navArea.innerHTML = `<a href="/user-login" class="btn btn-primary rounded-pill px-4 fw-bold btn-sm">Masuk / Daftar</a>`;
            }
        }

        function showError() {
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('errorContainer').style.display = 'block';
        }

        function getEventImage(event) {
            if (event.image && event.image.startsWith("http")) return event.image;
            const cat = (event.category || "General").toLowerCase();
            if (cat === 'konser') return "https://images.unsplash.com/photo-1540039155733-5bb30b53aa14?q=80&w=1200&auto=format&fit=crop";
            if (cat === 'olahraga') return "https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=1200&auto=format&fit=crop";
            return "https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1200&auto=format&fit=crop";
        }

async function loadEventDetail(id) {
            // 1. Tampilkan Loading Data, Sembunyikan Konten
            document.getElementById('loadingDataContainer').style.display = 'block';
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('errorContainer').style.display = 'none';

            try {
                const res = await fetch(`/api/events/${id}`);
                if (!res.ok) throw new Error("Event tidak ditemukan");
                
                currentEvent = await res.json();
                console.log("DATA EVENT DARI SERVER:", currentEvent);
                // 2. Isi Semua Data ke HTML
                document.getElementById('elTitle').innerText = currentEvent.name;
                document.getElementById('elOrganizer').innerText = "Creator: " + (currentEvent.organizer || "RCELLFEST");
                document.getElementById('elCategory').innerText = currentEvent.category || "General";
                // --- LOGIKA MENGUBAH LOKASI MENJADI LINK MAPS ---
                const venueElement = document.getElementById('elVenue');
                if (currentEvent.mapsUrl) {
                    // Kalau admin masukin link maps, bungkus pakai tag <a> agar teksnya berwarna biru/bisa diklik
                    venueElement.innerHTML = `<a href="${currentEvent.mapsUrl}" target="_blank" style="color: inherit; text-decoration: underline;">${currentEvent.location || "Lokasi TBA"} <i class="bi bi-box-arrow-up-right small"></i></a>`;
                } else {
                    // Kalau tidak ada link maps, tampilkan teks biasa
                    venueElement.innerText = currentEvent.location || "Lokasi TBA";
                }
                // --- UBAH TEKS JADI LINK BISA DIKLIK ---
                const rawDesc = currentEvent.description || "Deskripsi belum tersedia.";
                const urlRegex = /(https?:\/\/[^\s]+)/g; // Rumus pendeteksi tulisan "http://" atau "https://"
                const linkedDesc = rawDesc.replace(urlRegex, url => `<a href="${url}" target="_blank" style="color: var(--primary); text-decoration: underline;">${url}</a>`);
                
                document.getElementById('elDesc').innerHTML = linkedDesc;
                document.getElementById('eventHero').style.backgroundImage = `url('${getEventImage(currentEvent)}')`;
                
                const breadcrumbContainer = document.getElementById('breadcrumb-container');
                if (breadcrumbContainer && currentEvent) {
                    breadcrumbContainer.innerHTML = `
                        <div class="container">
                            <nav aria-label="breadcrumb" style="--bs-breadcrumb-divider: '>';">
                                <ol class="breadcrumb mb-0" style="font-size: 15px; font-weight: 500;">
                                    <li class="breadcrumb-item"><a href="/" style="color: var(--text-muted); text-decoration: none;">Beranda</a></li>
                                    <li class="breadcrumb-item"><span style="color: var(--text-muted);">Event</span></li>
                                    <li class="breadcrumb-item active" aria-current="page" style="color: var(--text-main); font-weight: 700;">${currentEvent.name}</li>
                                </ol>
                            </nav>
                        </div>
                    `;
                }
                
let dateStr = "Tanggal TBA";
let timeStr = "Jam TBA";

if (currentEvent.date) {
    const d = new Date(currentEvent.date);
    dateStr = d.toLocaleDateString('id-ID', {weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'});
}

// 👇 LOGIKA BARU: MENGAMBIL JAM DARI DATABASE BARU 👇
if (currentEvent.startTime && currentEvent.endTime) {
    timeStr = `${currentEvent.startTime} - ${currentEvent.endTime} WIB`;
} else if (currentEvent.startTime) {
    timeStr = `${currentEvent.startTime} WIB`;
} else if (currentEvent.date) {
    // Fallback jika admin lupa isi jam, ambil dari bawaan kalender
    const d = new Date(currentEvent.date);
    timeStr = d.toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'}) + ' WIB';
}
document.getElementById('elDate').innerText = dateStr;
document.getElementById('elTime').innerText = timeStr; // Menampilkan jam ke HTML

                renderTickets();
// 👇 RUMUS MENCETAK LINE UP DARI DATABASE 👇
                const lineupSection = document.getElementById('lineupSection');
                const lineupGrid = document.getElementById('lineupGrid');

                if (currentEvent.lineupImages && currentEvent.lineupImages.length > 0) {
                    lineupSection.style.display = 'block'; 
                    let htmlLineUp = '';
                    
currentEvent.lineupImages.forEach(imgUrl => {
                        htmlLineUp += `
                        <div class="col-6 col-md-4">
                            <div onclick="previewPoster('${imgUrl}')" class="position-relative w-100" style="border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-color); cursor: pointer; height: 250px;">
                                <img src="${imgUrl}" style="width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%); transition: 0.4s;" onmouseover="this.style.filter='grayscale(0%)'; this.style.transform='scale(1.05)';" onmouseout="this.style.filter='grayscale(30%)'; this.style.transform='scale(1)';">
                                
                                <div class="position-absolute bottom-0 start-50 translate-middle-x mb-3" style="pointer-events: none; width: max-content;">
                                    <span class="badge bg-dark bg-opacity-75 text-white rounded-pill px-3 py-2 badge-pulse" style="font-size: 0.7rem; backdrop-filter: blur(4px); border: 1px solid rgba(255,193,7,0.5);">
                                        <i class="bi bi-zoom-in me-1 text-warning"></i> Klik Perbesar
                                    </span>
                                </div>
                            </div>
                        </div>
                        `;
                    });
                    
                    lineupGrid.innerHTML = htmlLineUp;
                } else {
                    lineupSection.style.display = 'none'; 
                }
                // 👆 SELESAI RUMUS LINE UP 👆
                // 3. Sembunyikan Loading, Tampilkan Konten Asli
                document.getElementById('loadingDataContainer').style.display = 'none';
                document.getElementById('mainContainer').style.display = 'block';
                
                const loader = document.getElementById('preloader');
                if (loader) {
                    loader.classList.add('hide-loader');
                    setTimeout(() => loader.style.display = 'none', 800);
                }

            } catch (error) {
                showError();
            }
        }

        function showError() {
            document.getElementById('loadingDataContainer').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('errorContainer').style.display = 'block';
            
            const loader = document.getElementById('preloader');
            if (loader) {
                loader.classList.add('hide-loader');
                setTimeout(() => loader.style.display = 'none', 800);
            }
        }

function renderTickets() {
            const container = document.getElementById('ticketTierSelection');
            const btnBuy = document.getElementById('btnBuy');
            container.innerHTML = '';

            const now = new Date();
            // 🗓️ RUMUS WAKTU SELESAI: Gabungan Tanggal & Jam Selesai
            const waktuSelesaiEvent = new Date(`${currentEvent.date}T${currentEvent.endTime || '23:59'}`);

            const isFinished = currentEvent.availableSeats === -1;
            const isComingSoon = currentEvent.availableSeats === -2;
            const isEventSoldOut = currentEvent.availableSeats === 0;

            // 👇 --- SKENARIO 1: EVENT SELESAI (Waktu Lewat / Diset Manual Admin) --- 👇
            if (now > waktuSelesaiEvent || isFinished) {
                btnBuy.innerText = 'EVENT SELESAI'; 
                btnBuy.className = "btn btn-danger btn-lg px-4 rounded-pill fw-bold w-100 disabled";
                btnBuy.disabled = true;
                container.innerHTML = `<div class="alert alert-danger text-center fw-bold border-danger"><i class="bi bi-x-octagon-fill fs-4 d-block mb-2"></i> Event ini telah selesai.</div>`;
                return;
            }

            // 👇 --- SKENARIO 2: BELUM BUKA TIKET (COUNTDOWN) --- 👇
            if (currentEvent.salesOpenDate && new Date(currentEvent.salesOpenDate) > now) {
                btnBuy.innerHTML = '<i class="bi bi-clock-history"></i> AKAN HADIR'; 
                btnBuy.className = "btn btn-secondary btn-lg px-4 rounded-pill fw-bold w-100 disabled text-white";
                btnBuy.disabled = true;
                
                // Bikin tampilan box timer yang keren nutupin area tiket
                container.innerHTML = `
                    <div class="alert alert-info text-center border-info shadow-sm" style="background: var(--primary-light);">
                        <div class="small text-muted fw-bold mb-2"><i class="bi bi-ticket-detailed-fill"></i> PENJUALAN TIKET DIBUKA DALAM:</div>
                        <div id="timerDetail" class="fw-900 text-primary" style="font-size: 1.8rem; letter-spacing: 2px;">Menghitung...</div>
                    </div>`;
                    
                // Jalankan mesin hitung mundur
                setTimeout(() => { mulaiHitungMundurDetail(currentEvent.salesOpenDate); }, 100);
                return;
            }

            // 👇 --- SKENARIO 3: HABIS TERJUAL ATAU COMING SOON MANUAL --- 👇
            if (isComingSoon) {
                btnBuy.innerText = 'BELUM DIMULAI'; 
                btnBuy.className = "btn btn-info btn-lg px-4 rounded-pill fw-bold text-dark w-100 disabled";
                btnBuy.disabled = true;
                container.innerHTML = `<div class="alert alert-info text-center"><i class="bi bi-clock-fill"></i> Tiket belum dijual.</div>`;
                return;
            }
            if (isEventSoldOut) {
                btnBuy.innerText = 'HABIS TERJUAL'; 
                btnBuy.className = "btn btn-secondary btn-lg px-4 rounded-pill fw-bold w-100 disabled";
                btnBuy.disabled = true;
                container.innerHTML = `<div class="alert alert-danger text-center fw-bold">Seluruh Tiket Habis Terjual.</div>`;
                return;
            }

            // 👇 --- SKENARIO 4: NORMAL (SEDANG DIJUAL) --- 👇
            btnBuy.innerText = 'Pilih Tiket';
            btnBuy.className = "btn btn-secondary btn-lg px-4 rounded-pill fw-bold w-100 disabled"; // Disabled dulu sampai diklik
            btnBuy.disabled = true;

            let tickets = currentEvent.tickets;
            if (!tickets || tickets.length === 0) {
                tickets = [{ tierName: 'General', price: currentEvent.price, availableSeats: currentEvent.availableSeats }];
            }

            tickets.forEach((tier, index) => {
                const isSoldOut = tier.availableSeats <= 0;
                container.innerHTML += `
                    <label class="tier-label p-3 rounded-3 d-flex justify-content-between align-items-center ${isSoldOut ? 'tier-sold-out' : ''}" id="lblTier${index}">
                        <div class="d-flex align-items-center gap-3">
                            <input type="radio" name="ticketTier" class="form-check-input mt-0" onchange="selectTier(${index})" ${isSoldOut ? 'disabled' : ''}>
                            <div>
                                <h6 class="mb-0 fw-bold">${tier.tierName}</h6>
                                <small style="color: var(--text-muted);">Sisa: ${tier.availableSeats} tiket</small>
                            </div>
                        </div>
                        <div class="fw-bold text-primary fs-5">Rp ${tier.price.toLocaleString('id-ID')}</div>
                    </label>
                `;
            });
        }

        // --- MESIN HITUNG MUNDUR KHUSUS HALAMAN DETAIL ---
        function mulaiHitungMundurDetail(targetDateStr) {
            const targetWaktu = new Date(targetDateStr).getTime();

            const intervalTimer = setInterval(function() {
                const waktuSekarang = new Date().getTime();
                const selisih = targetWaktu - waktuSekarang;
                const tempatNampilin = document.getElementById('timerDetail');

                // KALAU WAKTUNYA SUDAH HABIS (WAKTUNYA BUKA TIKET!)
                if (selisih < 0) {
                    clearInterval(intervalTimer); 
                    // Refresh tampilan otomatis biar langsung munculin radio button list tiket!
                    renderTickets(); 
                    return;
                }

                // PERHITUNGAN BULAN, HARI, JAM, MENIT, DETIK
                const bulan = Math.floor(selisih / (1000 * 60 * 60 * 24 * 30));
                const hari = Math.floor((selisih % (1000 * 60 * 60 * 24 * 30)) / (1000 * 60 * 60 * 24));
                const jam = Math.floor((selisih % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const menit = Math.floor((selisih % (1000 * 60 * 60)) / (1000 * 60));
                const detik = Math.floor((selisih % (1000 * 60)) / 1000);

                if (tempatNampilin) {
                    let teksTimer = '';
                    if (bulan > 0) teksTimer += `${bulan} Bln `;
                    if (hari > 0 || bulan > 0) teksTimer += `${hari} Hr `;
                    teksTimer += `${jam.toString().padStart(2, '0')}:${menit.toString().padStart(2, '0')}:${detik.toString().padStart(2, '0')}`;
                    
                    tempatNampilin.innerHTML = teksTimer;
                }
            }, 1000);
        }

        function selectTier(index) {
            // Hapus class selected dari semua label
            document.querySelectorAll('.tier-label').forEach(el => el.classList.remove('selected'));
            document.getElementById(`lblTier${index}`).classList.add('selected');

            let tickets = currentEvent.tickets;
            if (!tickets || tickets.length === 0) tickets = [{ tierName: 'General', price: currentEvent.price, availableSeats: currentEvent.availableSeats }];
            
            selectedTierObj = tickets[index];
            document.getElementById('totalPriceDisplay').innerText = `Rp ${selectedTierObj.price.toLocaleString('id-ID')}`;
            
            const btnBuy = document.getElementById('btnBuy');
            btnBuy.disabled = false;
            btnBuy.className = "btn btn-primary btn-lg px-4 rounded-pill fw-bold shadow w-100";
            btnBuy.innerText = "Beli Sekarang";
            btnBuy.onclick = () => startCheckout();
        }

        // --- PROSES PINDAH KE HALAMAN CHECKOUT ---
        function startCheckout() {
            const userRaw = localStorage.getItem('userData');
            
            // 1. Cek kalau pembeli belum login
            if (!userRaw) {
                return Swal.fire({ 
                    title: 'Login Dulu', 
                    text: 'Silakan login member untuk membeli tiket.', 
                    icon: 'info', 
                    confirmButtonText: 'Login',
                    confirmButtonColor: '#0049CC',
                    background: 'var(--bg-card)', 
                    color: 'var(--text-main)'
                }).then(r => { 
                    if(r.isConfirmed) window.location.href = '/user-login'; 
                });
            }

            // 2. Bungkus data tiket & event untuk dibawa ke halaman checkout
            const checkoutData = {
                eventId: currentEvent._id,
                eventName: currentEvent.name,
                eventDate: currentEvent.date,
                eventLocation: currentEvent.location,
                tierName: selectedTierObj.tierName,
                price: selectedTierObj.price,
                availableSeats: selectedTierObj.availableSeats
            };

            // 3. Simpan ke dalam memori HP/Browser (Local Storage)
            localStorage.setItem('checkoutData', JSON.stringify(checkoutData));
            
            // 4. Lempar pembeli ke halaman checkout! 🚀
            window.location.href = `/checkout?id=${currentEvent._id}`;
        }
        // 👇 PASTE KODINGAN LANGKAH 2 DI SINI 👇
        function previewPoster(url) {
            Swal.fire({
                imageUrl: url,
                imageAlt: 'Poster Line Up',
                showConfirmButton: false,
                showCloseButton: true,
                width: 'auto',
                padding: '0',
                background: 'transparent',
                backdrop: 'rgba(0,0,0,0.9)' 
            });
        }
        // 👆 -------------------------------- 👆
    </script>
</body>
