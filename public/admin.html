<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | RCELLFEST</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='a' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%230049CC'/%3E%3Cstop offset='100%25' stop-color='%23007bff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='32' fill='url(%23a)'/%3E%3Cpath d='M21 18h8c5 0 9 3.5 9 8 0 3-1.8 5.7-4.5 7.2l5 8.8h-5l-4.2-7.5h-3.3v7.5h-5V18zm5 4v7h3c2.5 0 4.5-1.8 4.5-3.5S31.5 22 29 22h-3z' fill='white'/%3E%3Cpath d='M36 18h13v4h-8v6h7v4h-7v10h-5V18z' fill='white'/%3E%3C/svg%3E" type="image/svg+xml">

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --text-color: #ffffff;
            --primary-gradient: linear-gradient(135deg, #00c6ff, #0072ff);
        }

        body {
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            padding-top: 90px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); 
            border: var(--glass-border); 
            border-radius: 20px; 
            box-shadow: var(--glass-shadow); 
            padding: 25px; 
            color: white; 
        }
        
        .navbar { 
            background: rgba(15, 12, 41, 0.7); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding: 15px 0; 
        }
        
        .form-control, .form-select { 
            background: rgba(0, 0, 0, 0.3) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            color: white !important; 
            border-radius: 12px; 
            padding: 10px; 
        }
        
        .btn-primary { background: var(--primary-gradient); border: none; border-radius: 12px; font-weight: 600; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6); }

        .table { --bs-table-bg: transparent; --bs-table-color: white; border-color: rgba(255,255,255,0.1); }
        .table-thumb { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; }

        .modal-content { 
            background: rgba(28, 28, 45, 0.95); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; 
            color: white; 
        }
        
        .btn-close { filter: invert(1); }

        .img-preview-box { 
            width: 100%; height: 120px; border: 2px dashed rgba(255,255,255,0.2); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; margin-top: 5px; background: rgba(0,0,0,0.2); 
        }
        .img-preview-box img { width: 100%; height: 100%; object-fit: cover; }

        .tier-row { 
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); 
            padding: 10px; border-radius: 12px; margin-bottom: 8px; position: relative; 
        }
        .btn-remove-tier { position: absolute; top: -5px; right: -5px; border-radius: 50%; padding: 0 6px; font-size: 10px; }
        
        .promo-ticket { 
            border: 1px dashed #00c6ff; background: rgba(0, 198, 255, 0.1); 
            border-radius: 12px; padding: 12px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
    </style>
</head>
<body class="pb-5">

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="#">
                <i class="bi bi-shield-lock-fill text-info"></i> ADMIN PORTAL
            </a>
            <div class="d-flex gap-2">
                <button onclick="openPromoModal()" class="btn btn-outline-success btn-sm rounded-pill px-3"><i class="bi bi-ticket-perforated"></i> Promo</button>
                <button onclick="openAdminPassModal()" class="btn btn-outline-warning btn-sm rounded-pill px-3"><i class="bi bi-key"></i> Password</button>
                <button onclick="logout()" class="btn btn-danger btn-sm rounded-pill px-3"><i class="bi bi-power"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card d-flex justify-content-between align-items-center" style="border-left: 5px solid #ff9800;">
                    <div>
                        <h5 class="fw-bold mb-0">Maintenance Mode</h5>
                        <small class="text-white-50">Matikan akses publik sementara.</small>
                    </div>
                    <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="switchMaintenance"></div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="glass-card text-center" style="border-bottom: 4px solid #00c6ff;">
                    <h6 class="opacity-75 small">TOTAL PENDAPATAN</h6>
                    <h3 class="fw-bold text-info" id="totalPendapatan">Rp 0</h3>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="glass-card text-center" style="border-bottom: 4px solid #2ecc71;">
                    <h6 class="opacity-75 small">TIKET TERJUAL</h6>
                    <h3 class="fw-bold text-success" id="totalTiket">0 Tiket</h3>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="glass-card text-center" style="border-bottom: 4px solid #f1c40f; cursor:pointer;" onclick="openUserModal()">
                    <h6 class="opacity-75 small">USER AKTIF <i class="bi bi-box-arrow-in-right"></i></h6>
                    <h3 class="fw-bold text-warning" id="totalUser">0 Orang</h3>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold text-info">Grafik Pendapatan (7 Hari)</h6>
                        <button onclick="cetakLaporan()" class="btn btn-danger btn-sm rounded-pill px-3"><i class="bi bi-file-pdf"></i> Cetak PDF</button>
                    </div>
                    <div style="height: 250px;"><canvas id="revenueChart"></canvas></div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Tambah Produk</h5>
                    <form id="formEvent">
                        <div class="mb-3">
                            <label class="small text-white-50">Link Gambar</label>
                            <input type="text" id="image" class="form-control" oninput="previewImage(this.value, 'addPreview')">
                            <div class="img-preview-box"><img id="addPreview" style="display:none;"> <span id="addTxt">Preview</span></div>
                        </div>
                        <div class="mb-3">
                            <label class="small text-white-50">Kategori</label>
                            <select id="category" class="form-select">
                                <option value="General">General</option>
                                <option value="Konser">Konser</option>
                                <option value="Olahraga">Olahraga</option>
                                <option value="Streaming">Streaming</option>
                            </select>
                        </div>
                        <div class="mb-3"><input type="text" id="name" class="form-control" placeholder="Nama Event" required></div>
                        <div class="mb-3"><input type="text" id="location" class="form-control" placeholder="Lokasi" required></div>
                        <div class="mb-3"><input type="datetime-local" id="date" class="form-control" required></div>
                        <div class="mb-3"><textarea id="description" class="form-control" rows="2" placeholder="Deskripsi"></textarea></div>
                        
                        <div class="mb-3">
                            <div class="d-flex justify-content-between mb-2">
                                <label class="small fw-bold text-warning">Tiket & Stok</label>
                                <button type="button" class="btn btn-sm btn-warning py-0" onclick="addTierRow('addTiers')">+</button>
                            </div>
                            <div id="addTiers"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Publish Produk</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="glass-card">
                    <div class="d-flex justify-content-between mb-4">
                        <h5 class="fw-bold">Database Item</h5>
                        <input type="text" id="searchBox" class="form-control form-control-sm w-25" placeholder="Cari..." onkeyup="filterTable()">
                    </div>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr><th>Cover</th><th>Info</th><th>Harga</th><th class="text-center">Stok</th><th class="text-end">Aksi</th></tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3">
                <h5 class="fw-bold mb-3">Edit Produk</h5>
                <input type="hidden" id="editId">
                <div class="mb-3"><input type="text" id="editImage" class="form-control" oninput="previewImage(this.value, 'editPreview')"></div>
                <div class="img-preview-box mb-3"><img id="editPreview"></div>
                <div class="mb-3"><input type="text" id="editName" class="form-control"></div>
                <div class="mb-3"><input type="datetime-local" id="editDate" class="form-control"></div>
                <div id="editTiers" class="mb-3"></div>
                <button onclick="saveEdit()" class="btn btn-primary w-100">Simpan Perubahan</button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="promoModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content p-4">
                <h5 class="fw-bold text-success mb-3">Kelola Promo</h5>
                <form id="formPromo" class="row g-2 mb-4">
                    <div class="col-md-3"><input type="text" id="promoCode" class="form-control" placeholder="KODE" required></div>
                    <div class="col-md-3"><input type="number" id="promoDisc" class="form-control" placeholder="Potongan" required></div>
                    <div class="col-md-3"><input type="number" id="promoQuota" class="form-control" placeholder="Kuota" required></div>
                    <div class="col-md-3"><button type="submit" class="btn btn-success w-100">Buat</button></div>
                </form>
                <div id="promoList" class="overflow-auto" style="max-height: 300px;"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="userListModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header"><h5 class="fw-bold">Daftar User</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body p-0">
                    <table class="table mb-0">
                        <thead class="bg-white bg-opacity-10"><tr><th class="ps-3">User</th><th>Kontak</th><th>Saldo</th></tr></thead>
                        <tbody id="tableUserList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="adminPassModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content p-3">
                <h6 class="fw-bold mb-3">Ganti Password Admin</h6>
                <input type="password" id="oldP" class="form-control mb-2" placeholder="Lama">
                <input type="password" id="newP" class="form-control mb-2" placeholder="Baru">
                <button onclick="saveAdminPassword()" class="btn btn-warning w-100">Update</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        let eventsData = []; let myChart = null;
        const eModal = new bootstrap.Modal(document.getElementById('editModal'));
        const pModal = new bootstrap.Modal(document.getElementById('promoModal'));
        const uModal = new bootstrap.Modal(document.getElementById('userListModal'));
        const apModal = new bootstrap.Modal(document.getElementById('adminPassModal'));

        // --- CORE FUNCTIONS ---
        async function loadLaporan() {
            const res = await fetch('/api/admin/reports');
            const data = await res.json();
            if (res.ok) {
                document.getElementById('totalPendapatan').innerText = `Rp ${data.totalPendapatan.toLocaleString('id-ID')}`;
                document.getElementById('totalTiket').innerText = `${data.totalTiket} Tiket`;
                document.getElementById('totalUser').innerText = `${data.totalUser} Orang`;
                updateChart(data.chartLabels, data.chartValues);
            }
        }

        async function loadTable() {
            const res = await fetch('/api/events');
            eventsData = await res.json();
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            eventsData.forEach(ev => {
                let statusBadge = '';
                let actionBtn = '';
                if(ev.availableSeats === -1) {
                    statusBadge = '<span class="badge bg-secondary">SELESAI</span>';
                    actionBtn = `<button onclick="batalSelesai('${ev._id}')" class="btn btn-sm btn-success me-1"><i class="bi bi-play-fill"></i> Buka</button>`;
                } else if(ev.availableSeats === -2) {
                    statusBadge = '<span class="badge bg-info text-dark">SOON</span>';
                    actionBtn = `<button onclick="batalSelesai('${ev._id}')" class="btn btn-sm btn-success me-1"><i class="bi bi-play-fill"></i> Buka</button>`;
                } else {
                    statusBadge = `<span class="text-success fw-bold">${ev.availableSeats}</span>`;
                    actionBtn = `
                        <button onclick="tandaiSoon('${ev._id}')" class="btn btn-sm btn-info me-1"><i class="bi bi-clock"></i></button>
                        <button onclick="tandaiSelesai('${ev._id}')" class="btn btn-sm btn-warning me-1"><i class="bi bi-calendar-check"></i></button>`;
                }

                tbody.innerHTML += `
                    <tr>
                        <td><img src="${ev.image || 'https://placehold.co/50'}" class="table-thumb"></td>
                        <td><div class="fw-bold small">${ev.name}</div><small class="text-white-50">${ev.category}</small></td>
                        <td class="fw-bold small">Rp ${ev.price.toLocaleString('id-ID')}</td>
                        <td class="text-center">${statusBadge}</td>
                        <td class="text-end">
                            <div class="d-flex justify-content-end">
                                ${actionBtn}
                                <button onclick="bukaModalEdit('${ev._id}')" class="btn btn-sm btn-outline-light me-1"><i class="bi bi-pencil"></i></button>
                                <button onclick="hapusKonser('${ev._id}')" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        // --- ACTIONS ---
        async function tandaiSelesai(id) {
            await fetch(`/api/events/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ availableSeats: -1 }) });
            loadTable();
        }
        async function tandaiSoon(id) {
            await fetch(`/api/events/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ availableSeats: -2 }) });
            loadTable();
        }
        async function batalSelesai(id) {
            const ev = eventsData.find(e => e._id === id);
            await fetch(`/api/events/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ availableSeats: ev.capacity || 10 }) });
            loadTable();
        }
        async function hapusKonser(id) {
            if(confirm('Hapus item ini?')) { await fetch(`/api/events/${id}`, { method: 'DELETE' }); loadTable(); }
        }

        // --- MODAL TRIGGERS ---
        function openPromoModal() { pModal.show(); loadPromos(); }
        async function loadPromos() {
            const res = await fetch('/api/promos');
            const data = await res.json();
            document.getElementById('promoList').innerHTML = data.map(p => `
                <div class="promo-ticket">
                    <div class="small"><b>${p.code}</b><br>Rp ${p.discount.toLocaleString()} | Sisa: ${p.quota}</div>
                    <button onclick="hapusPromo('${p._id}')" class="btn btn-sm btn-danger">X</button>
                </div>`).join('');
        }
        async function hapusPromo(id) { await fetch(`/api/promos/${id}`, { method: 'DELETE' }); loadPromos(); }

        function openUserModal() { uModal.show(); loadUsers(); }
        async function loadUsers() {
            const res = await fetch('/api/admin/users');
            const result = await res.json();
            document.getElementById('tableUserList').innerHTML = result.data.map(u => `
                <tr><td class="ps-3 small"><b>${u.fullName}</b><br>@${u.username}</td>
                <td class="small">${u.email}</td><td class="text-success fw-bold small">Rp ${u.saldo.toLocaleString()}</td></tr>`).join('');
        }

        function openAdminPassModal() { apModal.show(); }
        async function saveAdminPassword() {
            const res = await fetch('/api/user/change-password', {
                method: 'PUT', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ oldPassword: document.getElementById('oldP').value, newPassword: document.getElementById('newP').value })
            });
            if(res.ok) { Swal.fire('Berhasil'); apModal.hide(); } else { Swal.fire('Gagal'); }
        }

        // --- HELPERS ---
        function addTierRow(id, n='', p='', s='') {
            document.getElementById(id).insertAdjacentHTML('beforeend', `
                <div class="tier-row">
                    <button type="button" class="btn btn-danger btn-remove-tier" onclick="this.parentElement.remove()">x</button>
                    <input type="text" class="form-control form-control-sm mb-1 tier-name" value="${n}" placeholder="Nama Tiket" required>
                    <div class="row g-1"><div class="col-6"><input type="number" class="form-control form-control-sm tier-price" value="${p}" placeholder="Harga"></div>
                    <div class="col-6"><input type="number" class="form-control form-control-sm tier-stock" value="${s}" placeholder="Stok"></div></div>
                </div>`);
        }
        function getTiers(id) {
            return Array.from(document.getElementById(id).querySelectorAll('.tier-row')).map(r => ({
                tierName: r.querySelector('.tier-name').value, price: parseInt(r.querySelector('.tier-price').value),
                availableSeats: parseInt(r.querySelector('.tier-stock').value), totalSeats: parseInt(r.querySelector('.tier-stock').value)
            }));
        }

        document.getElementById('formEvent').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tiers = getTiers('addTiers');
            const data = {
                name: document.getElementById('name').value, category: document.getElementById('category').value,
                location: document.getElementById('location').value, date: document.getElementById('date').value,
                description: document.getElementById('description').value, image: document.getElementById('image').value,
                price: tiers[0]?.price || 0, capacity: tiers.reduce((a,b)=>a+b.totalSeats,0),
                availableSeats: tiers.reduce((a,b)=>a+b.totalSeats,0), tickets: tiers
            };
            await fetch('/api/events', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
            loadTable(); e.target.reset(); document.getElementById('addTiers').innerHTML = '';
        });

        function updateChart(l, v) {
            const ctx = document.getElementById('revenueChart');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line', data: { labels: l, datasets: [{ data: v, borderColor: '#00c6ff', backgroundColor: 'rgba(0,198,255,0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }
        function previewImage(u, i) { const img = document.getElementById(i); if(u){ img.src=u; img.style.display='block'; if(document.getElementById('addTxt')) document.getElementById('addTxt').style.display='none'; } }
        function logout() { window.location.href = '/logout'; }
        
        // Init
        addTierRow('addTiers');
        loadLaporan(); loadTable();
    </script>
</body>
</html>
