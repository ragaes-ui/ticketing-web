<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | RCELLFEST</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='a' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%230049CC'/%3E%3Cstop offset='100%25' stop-color='%23007bff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='32' fill='url(%23a)'/%3E%3Cpath d='M21 18h8c5 0 9 3.5 9 8 0 3-1.8 5.7-4.5 7.2l5 8.8h-5l-4.2-7.5h-3.3v7.5h-5V18zm5 4v7h3c2.5 0 4.5-1.8 4.5-3.5S31.5 22 29 22h-3z' fill='white'/%3E%3Cpath d='M36 18h13v4h-8v6h7v4h-7v10h-5V18z' fill='white'/%3E%3C/svg%3E" type="image/svg+xml">

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'login.html';
    </script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --text-color: #ffffff;
            --primary-gradient: linear-gradient(135deg, #00c6ff, #0072ff);
        }

        body {
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            padding-top: 90px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .blob { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.6; }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #7f00ff; }
        .blob-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; background: #00c6ff; }

        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); 
            border: var(--glass-border); 
            border-radius: 20px; 
            box-shadow: var(--glass-shadow); 
            padding: 25px; 
            color: white; 
        }
        
        .navbar { 
            background: rgba(15, 12, 41, 0.7); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding: 15px 0; 
        }
        
        .form-control, .form-select { 
            background: rgba(0, 0, 0, 0.3) !important; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            color: white !important; 
            border-radius: 12px; 
            padding: 12px; 
        }
        
        .form-control:focus { 
            border-color: #00c6ff; 
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.3); 
        }
        
        ::placeholder { color: rgba(255, 255, 255, 0.4) !important; }

        .btn-primary { 
            background: var(--primary-gradient); 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            font-weight: 600; 
            transition: 0.3s; 
        }
        
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6); 
        }

        .table { --bs-table-bg: transparent; --bs-table-color: white; border-color: rgba(255,255,255,0.1); }
        .table-thumb { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; }

        .modal-content { 
            background: rgba(28, 28, 45, 0.95); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; 
            color: white; 
        }
        
        .modal-header, .modal-footer { border-color: rgba(255,255,255,0.1); }
        .btn-close { filter: invert(1); }

        .img-preview-box { 
            width: 100%; height: 150px; 
            border: 2px dashed rgba(255,255,255,0.2); 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; margin-top: 10px; background: rgba(0,0,0,0.2); 
        }
        .img-preview-box img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .form-check-input { height: 1.8em; width: 3.5em; background-color: rgba(255,255,255,0.2); border: none; }
        .form-check-input:checked { background-color: #ff0055; }

        /* --- PROMO & TIER STYLES --- */
        .promo-ticket { 
            border: 1px dashed #00c6ff; 
            background: rgba(0, 198, 255, 0.1); 
            border-radius: 12px; padding: 12px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; transition: 0.2s; 
        }
        .promo-ticket:hover { background: rgba(0, 198, 255, 0.2); }
        .promo-code { font-family: monospace; font-size: 1.2rem; font-weight: bold; color: #ffeb3b; letter-spacing: 1px; }

        .tier-row { 
            background: rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 15px; border-radius: 12px; margin-bottom: 10px; position: relative; 
        }
        .btn-remove-tier { 
            position: absolute; top: -10px; right: -10px; 
            border-radius: 50%; width: 25px; height: 25px; 
            display: flex; align-items: center; justify-content: center; padding: 0; font-size: 12px; 
        }
    </style>
</head>
<body class="pb-5">

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center gap-2" href="#">
                <i class="bi bi-shield-lock-fill text-info"></i> ADMIN PORTAL
            </a>
            
            <div class="d-flex gap-2 align-items-center">
                <button onclick="toggleLanguage()" class="btn btn-sm btn-outline-light rounded-pill fw-bold me-2" id="lang-btn" style="min-width: 40px;">ID</button>
                <a href="index.html" class="btn btn-outline-light btn-sm rounded-pill px-3" target="_blank">
                    <i class="bi bi-box-arrow-up-right me-1"></i> <span data-i18n="nav_website">Website</span>
                </a>
                <button onclick="openPromoModal()" class="btn btn-outline-success btn-sm rounded-pill px-3">
                    <i class="bi bi-ticket-perforated-fill me-1"></i> <span data-i18n="nav_promo">Kelola Promo</span>
                </button>
                <button onclick="openAdminPassModal()" class="btn btn-outline-warning btn-sm rounded-pill px-3">
                    <i class="bi bi-key me-1"></i> <span data-i18n="nav_password">Password</span>
                </button>
                <button onclick="logout()" class="btn btn-danger btn-sm rounded-pill px-4">
                    <i class="bi bi-power"></i> <span data-i18n="nav_logout">Logout</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <div class="glass-card d-flex justify-content-between align-items-center" style="border-left: 5px solid #ff9800;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="bg-warning bg-opacity-25 p-3 rounded-circle text-warning"><i class="bi bi-cone-striped fs-4"></i></div>
                        <div>
                            <h5 class="fw-bold mb-0" data-i18n="maint_title">Maintenance Mode</h5>
                            <small class="text-white-50" data-i18n="maint_desc">Matikan akses publik sementara.</small>
                        </div>
                    </div>
                    <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="switchMaintenance"></div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass-card sticky-top" style="top: 110px; z-index: 10;">
                    <div class="d-flex align-items-center gap-2 mb-4 border-bottom border-secondary pb-3">
                        <i class="bi bi-plus-circle-fill text-info fs-5"></i>
                        <h5 class="fw-bold m-0" data-i18n="form_title">Tambah Produk</h5>
                    </div>
                    
                    <form id="formEvent">
                        <div class="mb-3">
                            <label class="form-label" data-i18n="lbl_image">Link Gambar</label>
                            <input type="text" id="image" class="form-control" placeholder="https://..." oninput="previewImage(this.value, 'addPreview', 'addPreviewText')">
                            <div class="img-preview-box">
                                <span id="addPreviewText" data-i18n="txt_preview">Preview Gambar</span>
                                <img id="addPreview" src="" alt="Preview">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" data-i18n="lbl_category">Kategori</label>
                            <select id="category" class="form-select" onchange="checkCategory(this)">
                                <option value="General">General</option>
                                <option value="Konser">Konser Musik</option>
                                <option value="Olahraga">Olahraga</option>
                                <option value="Workshop">Workshop</option>
                                <option value="Streaming" class="fw-bold text-info">🎥 Akun Streaming</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" data-i18n="lbl_name">Nama Event/Produk</label>
                            <input type="text" id="name" class="form-control" placeholder="..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" data-i18n="lbl_location">Lokasi / Platform</label>
                            <input type="text" id="location" class="form-control" placeholder="TBA / Aplikasi" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" data-i18n="lbl_date">Tanggal / Expired</label>
                            <input type="datetime-local" id="date" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" data-i18n="lbl_desc">Deskripsi / Akun</label>
                            <textarea id="description" class="form-control" rows="3" placeholder="..."></textarea>
                            <small class="text-info fst-italic" id="descHint" style="font-size: 0.75rem;"></small>
                        </div>
                        
                        <div class="mb-3 pt-3 border-top border-secondary">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label fw-bold m-0 text-warning">Tipe Tiket & Harga</label>
                                <button type="button" class="btn btn-sm btn-outline-warning rounded-pill py-0" onclick="addTierRow('addTiersContainer')">+ Tambah</button>
                            </div>
                            
                            <div id="addTiersContainer">
                                <div class="tier-row">
                                    <input type="text" class="form-control form-control-sm mb-2 tier-name" placeholder="Nama Tiket (Misal: VIP, Regular)" required>
                                    <div class="row g-2">
                                        <div class="col-6"><input type="number" class="form-control form-control-sm tier-price" placeholder="Harga (Rp)" required></div>
                                        <div class="col-6"><input type="number" class="form-control form-control-sm tier-stock" placeholder="Kuota / Stok" required></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-2" id="btnPublish">
                            <i class="bi bi-rocket-takeoff me-2"></i> <span data-i18n="btn_publish">Publish Sekarang</span>
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="glass-card h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0"><i class="bi bi-database-fill me-2 text-primary"></i> <span data-i18n="table_title">Database Item</span></h5>
                        <div class="d-flex gap-2">
                            <input type="text" id="searchBox" class="form-control form-control-sm" placeholder="..." style="width: 150px;" onkeyup="filterTable()">
                            <button class="btn btn-sm btn-outline-light rounded-pill px-3" onclick="loadTable()"><i class="bi bi-arrow-clockwise me-1"></i> Refresh</button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th width="60" data-i18n="th_cover">Cover</th>
                                    <th data-i18n="th_info">Produk Info</th>
                                    <th data-i18n="th_price">Harga (Mulai)</th>
                                    <th class="text-center" data-i18n="th_stock">Status/Stok</th>
                                    <th class="text-end" data-i18n="th_action">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2"></i> <span data-i18n="modal_edit_title">Edit Data</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formEdit">
                        <input type="hidden" id="editId">
                        
                        <div class="mb-3">
                            <label data-i18n="lbl_image">Link Gambar</label>
                            <input type="text" id="editImage" class="form-control" oninput="previewImage(this.value, 'editPreview', 'editPreviewText')">
                            <div class="img-preview-box" style="height: 120px;">
                                <span id="editPreviewText" data-i18n="txt_preview">Preview</span>
                                <img id="editPreview" src="" alt="Preview">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label data-i18n="lbl_name">Nama Event</label>
                            <input type="text" id="editName" class="form-control">
                        </div>
                        
                        <div class="mb-3">
                            <label data-i18n="lbl_category">Kategori</label>
                            <select id="editCategory" class="form-select">
                                <option value="General">General</option>
                                <option value="Konser">Konser</option>
                                <option value="Olahraga">Olahraga</option>
                                <option value="Workshop">Workshop</option>
                                <option value="Streaming">Streaming</option>
                            </select>
                        </div>
                        
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label data-i18n="lbl_location">Lokasi</label>
                                <input type="text" id="editLocation" class="form-control">
                            </div>
                            <div class="col-6">
                                <label data-i18n="lbl_date">Tanggal</label>
                                <input type="datetime-local" id="editDate" class="form-control">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label data-i18n="lbl_desc">Deskripsi</label>
                            <textarea id="editDescription" class="form-control" rows="3"></textarea>
                        </div>
                        
                        <div class="mb-3 pt-3 border-top border-secondary">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label fw-bold m-0 text-warning">Edit Tipe Tiket</label>
                                <button type="button" class="btn btn-sm btn-outline-warning rounded-pill py-0" onclick="addTierRow('editTiersContainer')">+ Tambah</button>
                            </div>
                            <div id="editTiersContainer"></div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal" data-i18n="btn_cancel">Batal</button>
                    <button onclick="saveEdit()" class="btn btn-primary px-4" data-i18n="btn_save_changes">Simpan Perubahan</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="promoModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-success"><i class="bi bi-ticket-perforated-fill me-2"></i> Kelola Kode Promo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="row">
                        <div class="col-md-5 border-end border-secondary mb-4 mb-md-0">
                            <h6 class="fw-bold mb-3 text-warning">Buat Promo Baru</h6>
                            <form id="formPromo">
                                <div class="mb-2">
                                    <label class="small text-muted">Kode Promo (Unik)</label>
                                    <input type="text" id="promoCode" class="form-control text-uppercase fw-bold" placeholder="Misal: DISKON10" required>
                                </div>
                                <div class="mb-2">
                                    <label class="small text-muted">Nominal Diskon</label>
                                    <input type="number" id="promoDisc" class="form-control" placeholder="Rp" required>
                                </div>
                                <div class="row g-2 mb-3">
                                    <div class="col-6">
                                        <label class="small text-muted">Kuota</label>
                                        <input type="number" id="promoQuota" class="form-control" placeholder="100" required>
                                    </div>
                                    <div class="col-6">
                                        <label class="small text-muted">Aktif (Hari)</label>
                                        <input type="number" id="promoDays" class="form-control" placeholder="7" required>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-success w-100 fw-bold">Buat Promo</button>
                            </form>
                        </div>
                        
                        <div class="col-md-7 ps-md-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h6 class="fw-bold text-info m-0">Daftar Promo Aktif</h6>
                                <button onclick="loadPromos()" class="btn btn-sm btn-outline-light"><i class="bi bi-arrow-clockwise"></i></button>
                            </div>
                            <div style="max-height: 350px; overflow-y: auto;" id="promoListContainer">
                                <div class="text-center text-muted small py-4">Memuat data promo...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="adminPassModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-warning"><i class="bi bi-shield-lock me-2"></i> <span data-i18n="modal_admin_pass_title">Ganti Password Admin</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label data-i18n="lbl_old_pass">Password Lama</label>
                        <input type="password" id="adminOldPass" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label data-i18n="lbl_new_pass">Password Baru</label>
                        <input type="password" id="adminNewPass" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label data-i18n="lbl_confirm_pass">Konfirmasi Password Baru</label>
                        <input type="password" id="adminConfirmPass" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal" data-i18n="btn_cancel">Batal</button>
                    <button onclick="saveAdminPassword()" class="btn btn-warning px-4 text-dark fw-bold" data-i18n="btn_save_pass">Update Password</button>
                </div>
            </div>
        </div>
    </div>

                lbl_name: "Event/Product Name", lbl_location: "Location / Platform", lbl_date: "Date / Expired", lbl_desc: "Description / Account",
                lbl_price: "Price (IDR)", lbl_stock: "Stock", btn_publish: "Publish Now", table_title: "Items Database",
                th_cover: "Cover", th_info: "Product Info", th_price: "Price", th_stock: "Stock", th_action: "Action",
                modal_edit_title: "Edit Data", lbl_update_stock: "Update Remaining Stock", btn_cancel: "Cancel", btn_save_changes: "Save Changes",
                desc_hint_stream: "💡 Info: Enter account credentials here so users can see them after payment.",
                desc_hint_default: "", ph_desc_stream: "Format: Email | Password | Expired\nExample: user@gmail.com | pass123 | 30 Days",
                ph_desc_default: "Full event description...", toast_maint_on: "Maintenance Active 🔴", toast_maint_off: "Website Online 🟢",
                alert_success_title: "Success!", alert_success_add: "Product added successfully.", alert_success_edit: "Data has been updated.",
                alert_del_title: "Delete Data?", alert_del_text: "Data cannot be recovered!", btn_confirm_del: "Yes, Delete!", btn_cancel_del: "Cancel",
                empty_table: "No events/products data found.",
                modal_admin_pass_title: "Change Admin Password", lbl_old_pass: "Old Password", lbl_new_pass: "New Password", lbl_confirm_pass: "Confirm New Password",
                btn_save_pass: "Update Password", err_pass_match: "New passwords do not match!", err_pass_empty: "Please fill in all password fields!",
                success_pass: "Password changed successfully! Please login again."
            }
        };

        const savedLang = localStorage.getItem('lang') || 'id';
        updateLanguage(savedLang);

        function toggleLanguage() {
            const currentLang = localStorage.getItem('lang') || 'id';
            const newLang = currentLang === 'id' ? 'en' : 'id';
            localStorage.setItem('lang', newLang);
            updateLanguage(newLang);
            loadTable(); 
            checkCategory(document.getElementById('category'));
        }

        function updateLanguage(lang) {
            const t = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(t[key]) {
                    if(el.querySelector('i')) {
                        const icon = el.querySelector('i').outerHTML;
                        el.innerHTML = `${icon} ${t[key]}`;
                    } else {
                        el.innerHTML = t[key];
                    }
                }
            });
            const searchBox = document.getElementById('searchBox');
            if(searchBox) searchBox.placeholder = lang === 'id' ? 'Cari...' : 'Search...';
            const langBtn = document.getElementById('lang-btn');
            langBtn.innerText = lang.toUpperCase();
            
            if(lang === 'en') { 
                langBtn.classList.remove('btn-outline-light'); 
                langBtn.classList.add('btn-light'); 
            } else { 
                langBtn.classList.add('btn-outline-light'); 
                langBtn.classList.remove('btn-light'); 
            }
        }

        function previewImage(url, imgId, textId) {
            const imgEl = document.getElementById(imgId);
            const textEl = document.getElementById(textId);
            if (url && url.length > 5) { 
                imgEl.src = url; 
                imgEl.style.display = 'block'; 
                if(textEl) textEl.style.display = 'none'; 
            } else { 
                imgEl.style.display = 'none'; 
                if(textEl) textEl.style.display = 'block'; 
            }
        }

        function filterTable() {
            const term = document.getElementById('searchBox').value.toLowerCase();
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach(row => { 
                row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none'; 
            });
        }

        function checkCategory(select) {
            const lang = localStorage.getItem('lang') || 'id';
            const t = translations[lang];
            const desc = document.getElementById('description');
            if (select.value === 'Streaming') { 
                desc.placeholder = t.ph_desc_stream; 
                document.getElementById('descHint').innerText = t.desc_hint_stream; 
            } else { 
                desc.placeholder = t.ph_desc_default; 
                document.getElementById('descHint').innerText = t.desc_hint_default; 
            }
        }

        function addTierRow(containerId, tierName = '', price = '', stock = '') {
            const container = document.getElementById(containerId);
            const rowHtml = `
                <div class="tier-row">
                    <button type="button" class="btn btn-danger btn-remove-tier" onclick="this.parentElement.remove()">X</button>
                    <input type="text" class="form-control form-control-sm mb-2 tier-name" placeholder="Nama Tiket (Misal: VIP, Regular)" value="${tierName}" required>
                    <div class="row g-2">
                        <div class="col-6"><input type="number" class="form-control form-control-sm tier-price" placeholder="Harga (Rp)" value="${price}" required></div>
                        <div class="col-6"><input type="number" class="form-control form-control-sm tier-stock" placeholder="Kuota" value="${stock}" required></div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', rowHtml);
        }

        function getTiersData(containerId) {
            const container = document.getElementById(containerId);
            const rows = container.querySelectorAll('.tier-row');
            let tiers = [];
            rows.forEach(row => {
                const name = row.querySelector('.tier-name').value;
                const price = row.querySelector('.tier-price').value;
                const stock = row.querySelector('.tier-stock').value;
                if(name && price && stock) {
                    tiers.push({ tierName: name, price: parseInt(price), totalSeats: parseInt(stock), availableSeats: parseInt(stock) });
                }
            });
            return tiers;
        }

        async function checkMaintenanceStatus() {
            try { 
                const res = await fetch('/api/maintenance'); 
                const data = await res.json(); 
                if(switchMaint) switchMaint.checked = data.isActive; 
            } catch (err) {}
        }

        if(switchMaint) {
            switchMaint.addEventListener('change', async function() {
                const lang = localStorage.getItem('lang') || 'id';
                const t = translations[lang];
                const isActive = this.checked;
                try { 
                    await fetch('/api/maintenance', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ isActive }) }); 
                    const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true, background: '#1c1c2d', color: '#fff' });
                    Toast.fire({ icon: 'success', title: isActive ? t.toast_maint_on : t.toast_maint_off });
                } catch (err) { 
                    this.checked = !isActive; 
                }
            });
        }
        
        // --- LOAD TABEL EVENT ---
        async function loadTable() {
            const lang = localStorage.getItem('lang') || 'id';
            const t = translations[lang];
            try {
                const res = await fetch('/api/events'); 
                eventsData = await res.json();
                const tbody = document.getElementById('tableBody'); 
                tbody.innerHTML = '';
                
                if(eventsData.length === 0) { 
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-white-50">${t.empty_table}</td></tr>`; 
                    return; 
                }
                
                eventsData.forEach(ev => {
                    let icon = ev.category === 'Streaming' ? '<span class="badge bg-info text-dark me-2" style="font-size:0.6rem">STREAM</span>' : '<span class="badge bg-primary me-2" style="font-size:0.6rem">EVENT</span>';
                    
                    let stokClass = ev.availableSeats < 5 && ev.availableSeats >= 0 ? 'text-danger fw-bold' : 'text-success';
                    
                    let stokDisplay = ev.availableSeats;
                    if (ev.availableSeats === -1) stokDisplay = '<span class="badge bg-secondary">SELESAI</span>';
                    if (ev.availableSeats === -2) stokDisplay = '<span class="badge bg-info text-dark">COMING SOON</span>';
                    
                    let imgUrl = ev.image ? ev.image : "https://placehold.co/100x100?text=No+Img";

                    let btnStatus = '';
                    if (ev.availableSeats === -1 || ev.availableSeats === -2) {
                        btnStatus = `<button onclick="batalSelesai('${ev._id}')" class="btn btn-sm btn-outline-success me-1" title="Buka Kembali Event"><i class="bi bi-arrow-counterclockwise"></i> Buka</button>`;
                    } else {
                        btnStatus = `
                            <button onclick="tandaiBelumDimulai('${ev._id}')" class="btn btn-sm btn-outline-info me-1" title="Tandai Belum Dimulai"><i class="bi bi-clock-fill"></i></button>
                            <button onclick="tandaiSelesai('${ev._id}')" class="btn btn-sm btn-outline-warning me-1" title="Tandai Selesai"><i class="bi bi-calendar-check-fill"></i></button>
                        `;
                    }
                    
                    tbody.innerHTML += `
                    <tr>
                        <td><img src="${imgUrl}" class="table-thumb" alt="Thumb"></td>
                        <td>
                            <div class="fw-bold text-truncate" style="max-width: 200px;">${ev.name}</div>
                            <small class="text-white-50 d-flex align-items-center gap-1">${icon} <i class="bi bi-geo-alt" style="font-size:0.7rem"></i> ${ev.location}</small>
                        </td>
                        <td class="fw-bold">Rp ${ev.price.toLocaleString('id-ID')}</td>
                        <td class="text-center ${stokClass}">${stokDisplay}</td>
                        <td class="text-end">
                            ${btnStatus}
                            <button onclick="bukaModalEdit('${ev._id}')" class="btn btn-sm btn-outline-light me-1"><i class="bi bi-pencil-fill"></i></button>
                            <button onclick="hapusKonser('${ev._id}')" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash-fill"></i></button>
                        </td>
                    </tr>`;
                });
            } catch (err) { console.error(err); }
        }

        // --- TANDAI SELESAI ---
        async function tandaiSelesai(id) { 
            const lang = localStorage.getItem('lang') || 'id';
            const result = await Swal.fire({ 
                title: lang === 'id' ? 'Selesaikan Event?' : 'Finish Event?', 
                text: lang === 'id' ? 'Tiket tidak bisa dibeli lagi dan berstatus Selesai.' : 'Tickets will no longer be purchasable.', 
                icon:'warning', 
                showCancelButton:true, 
                confirmButtonColor: '#f39c12', 
                cancelButtonColor: '#3085d6', 
                confirmButtonText: lang === 'id' ? 'Ya, Selesaikan' : 'Yes, Finish',
                cancelButtonText: lang === 'id' ? 'Batal' : 'Cancel',
                background: '#1c1c2d', color: '#fff' 
            });
            
            if(result.isConfirmed) { 
                await fetch(`/api/events/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json', 'Authorization': 'Bearer ' + token}, body: JSON.stringify({ availableSeats: -1 }) }); 
                loadTable(); 
                Swal.fire({icon: 'success', title: 'Berhasil', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#1c1c2d', color: '#fff'});
            } 
        }

        // --- TANDAI BELUM DIMULAI ---
        async function tandaiBelumDimulai(id) { 
            const result = await Swal.fire({ 
                title: 'Jadikan Coming Soon?', 
                text: 'Status event akan menjadi Belum Dimulai.', 
                icon:'info', showCancelButton:true, confirmButtonColor: '#0dcaf0', cancelButtonColor: '#3085d6', confirmButtonText: 'Ya, Tunda', background: '#1c1c2d', color: '#fff' 
            });
            if(result.isConfirmed) { 
                await fetch(`/api/events/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json', 'Authorization': 'Bearer ' + token}, body: JSON.stringify({ availableSeats: -2 }) }); 
                loadTable(); 
                Swal.fire({icon: 'success', title: 'Status Diubah', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#1c1c2d', color: '#fff'});
            } 
        }

        // --- BATAL SELESAI / BUKA KEMBALI ---
        async function batalSelesai(id) { 
            const ev = eventsData.find(e => e._id === id);
            let restoredSeats = 0;
            if (ev.tickets && ev.tickets.length > 0) {
                restoredSeats = ev.tickets.reduce((acc, curr) => acc + curr.availableSeats, 0);
            }

            const lang = localStorage.getItem('lang') || 'id';
            const result = await Swal.fire({ 
                title: lang === 'id' ? 'Buka Kembali Event?' : 'Reopen Event?', 
                text: lang === 'id' ? 'Tiket bisa dibeli lagi sesuai sisa kuota yang ada.' : 'The event will be active again.', 
                icon:'question', 
                showCancelButton:true, 
                confirmButtonColor: '#28a745', 
                cancelButtonColor: '#3085d6', 
                confirmButtonText: lang === 'id' ? 'Ya, Buka Kembali' : 'Yes, Reopen',
                cancelButtonText: lang === 'id' ? 'Batal' : 'Cancel',
                background: '#1c1c2d', color: '#fff' 
            });
            
            if(result.isConfirmed) { 
                await fetch(`/api/events/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json', 'Authorization': 'Bearer ' + token}, body: JSON.stringify({ availableSeats: restoredSeats }) }); 
                loadTable(); 
                Swal.fire({icon: 'success', title: 'Berhasil Dibuka', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#1c1c2d', color: '#fff'});
            } 
        }

        // --- BUKA EDIT MODAL ---
        function bukaModalEdit(id) {
            const ev = eventsData.find(e => e._id === id);
            if (ev) {
                document.getElementById('editId').value = ev._id;
                document.getElementById('editName').value = ev.name;
                document.getElementById('editCategory').value = ev.category;
                document.getElementById('editLocation').value = ev.location;
                if (ev.date) { 
                    const d = new Date(ev.date); 
                    d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); 
                    document.getElementById('editDate').value = d.toISOString().slice(0, 16); 
                } else { 
                    document.getElementById('editDate').value = ''; 
                }
                document.getElementById('editDescription').value = ev.description;
                document.getElementById('editImage').value = ev.image || '';
                previewImage(ev.image || '', 'editPreview', 'editPreviewText');
                
                const tiersContainer = document.getElementById('editTiersContainer');
                tiersContainer.innerHTML = '';
                if (ev.tickets && ev.tickets.length > 0) {
                    ev.tickets.forEach(t => addTierRow('editTiersContainer', t.tierName, t.price, t.availableSeats));
                } else {
                    addTierRow('editTiersContainer', 'General', ev.price, (ev.availableSeats === -1 || ev.availableSeats === -2) ? 0 : ev.availableSeats);
                }
                editModal.show();
            }
        }

        // --- SIMPAN EDIT EVENT ---
        async function saveEdit() {
            const lang = localStorage.getItem('lang') || 'id'; 
            const t = translations[lang];
            const id = document.getElementById('editId').value;
            const rawDate = document.getElementById('editDate').value;
            const isoDate = rawDate ? new Date(rawDate).toISOString() : null;
            
            const tiersData = getTiersData('editTiersContainer');
            if (tiersData.length === 0) return Swal.fire('Error', 'Minimal tambahkan 1 tipe tiket!', 'error');
            
            const startFromPrice = Math.min(...tiersData.map(t => t.price));
            const totalAvailCap = tiersData.reduce((acc, curr) => acc + curr.availableSeats, 0);

            const data = { 
                name: document.getElementById('editName').value, 
                category: document.getElementById('editCategory').value, 
                location: document.getElementById('editLocation').value, 
                date: isoDate, 
                description: document.getElementById('editDescription').value, 
                image: document.getElementById('editImage').value, 
                price: startFromPrice, 
                availableSeats: totalAvailCap, 
                tickets: tiersData 
            };

            await fetch(`/api/events/${id}`, { method: 'PUT', headers: {'Content-Type':'application/json', 'Authorization': 'Bearer ' + token}, body: JSON.stringify(data) });
            editModal.hide(); 
            loadTable(); 
            Swal.fire({ title: t.alert_success_title, text: t.alert_success_edit, icon: 'success', background: '#1c1c2d', color: '#fff' });
        }

        // --- TAMBAH EVENT ---
        document.getElementById('formEvent').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const lang = localStorage.getItem('lang') || 'id'; 
            const t = translations[lang];
            
            const tiersData = getTiersData('addTiersContainer');
            if (tiersData.length === 0) return Swal.fire('Error', 'Minimal tambahkan 1 tipe tiket!', 'error');
            
            const startFromPrice = Math.min(...tiersData.map(t => t.price));
            const totalCap = tiersData.reduce((acc, curr) => acc + curr.totalSeats, 0);

            const btn = document.getElementById('btnPublish'); 
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Loading...';
            
            const data = { 
                name: document.getElementById('name').value, 
                category: document.getElementById('category').value, 
                location: document.getElementById('location').value, 
                date: document.getElementById('date').value, 
                description: document.getElementById('description').value, 
                image: document.getElementById('image').value, 
                price: startFromPrice, 
                capacity: totalCap, 
                availableSeats: totalCap, 
                tickets: tiersData 
            };

            await fetch('/api/events', { method: 'POST', headers: {'Content-Type':'application/json', 'Authorization': 'Bearer ' + token}, body: JSON.stringify(data) });
            
            loadTable(); 
            e.target.reset(); 
            document.getElementById('addTiersContainer').innerHTML = ''; 
            addTierRow('addTiersContainer'); 
            document.getElementById('addPreview').style.display = 'none'; 
            document.getElementById('addPreviewText').style.display = 'block';
            
            btn.innerHTML = originalText; 
            Swal.fire({ title: t.alert_success_title, text: t.alert_success_add, icon: 'success', background: '#1c1c2d', color: '#fff' });
        });

        // --- HAPUS EVENT ---
        async function hapusKonser(id) { 
            const lang = localStorage.getItem('lang') || 'id'; 
            const t = translations[lang];
            const result = await Swal.fire({ title: t.alert_del_title, text: t.alert_del_text, icon:'warning', showCancelButton:true, confirmButtonColor: '#d33', cancelButtonColor: '#3085d6', confirmButtonText: t.btn_confirm_del, cancelButtonText: t.btn_cancel_del, background: '#1c1c2d', color: '#fff' });
            
            if(result.isConfirmed) { 
                await fetch(`/api/events/${id}`, { method: 'DELETE', headers: {'Authorization': 'Bearer ' + token} }); 
                loadTable(); 
            } 
        }

        // --- MANAJEMEN PROMO ---
        function openPromoModal() { promoModal.show(); loadPromos(); }
        
        async function loadPromos() {
            const container = document.getElementById('promoListContainer');
            try {
                const res = await fetch('/api/promos'); 
                const promos = await res.json();
                if(promos.length === 0) { 
                    container.innerHTML = '<div class="text-center text-muted small py-4">Belum ada promo aktif.</div>'; 
                    return; 
                }
                let html = '';
                promos.forEach(p => {
                    const date = new Date(p.expiresAt).toLocaleDateString();
                    html += `<div class="promo-ticket"><div><div class="promo-code">${p.code}</div><div class="small text-white-50">Diskon: Rp ${p.discount.toLocaleString('id-ID')} | Kuota: ${p.quota}</div><div class="small text-muted" style="font-size:0.7rem">Exp: ${date}</div></div><button onclick="hapusPromo('${p._id}')" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></button></div>`;
                });
                container.innerHTML = html;
            } catch (e) { container.innerHTML = '<div class="text-danger small">Gagal memuat data.</div>'; }
        }

        document.getElementById('formPromo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = { 
                code: document.getElementById('promoCode').value, 
                discount: document.getElementById('promoDisc').value, 
                quota: document.getElementById('promoQuota').value, 
                daysActive: document.getElementById('promoDays').value 
            };
            try { 
                await fetch('/api/promos', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); 
                e.target.reset(); 
                loadPromos(); 
                const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#1c1c2d', color: '#fff' }); 
                Toast.fire({ icon: 'success', title: 'Promo Berhasil Dibuat!' }); 
            } catch (e) { Swal.fire('Error', 'Gagal membuat promo', 'error'); }
        });

        async function hapusPromo(id) { 
            if(confirm('Yakin ingin menghapus promo ini?')) { 
                await fetch(`/api/promos/${id}`, { method: 'DELETE' }); 
                loadPromos(); 
            } 
        }

        // --- GANTI PASSWORD ---
        function openAdminPassModal() { 
            document.getElementById('adminOldPass').value = ''; 
            document.getElementById('adminNewPass').value = ''; 
            document.getElementById('adminConfirmPass').value = ''; 
            adminPassModal.show(); 
        }

        async function saveAdminPassword() {
            const lang = localStorage.getItem('lang') || 'id'; 
            const t = translations[lang];
            const oldPass = document.getElementById('adminOldPass').value; 
            const newPass = document.getElementById('adminNewPass').value; 
            const confirmPass = document.getElementById('adminConfirmPass').value;
            
            if (!oldPass || !newPass || !confirmPass) { 
                return Swal.fire({icon: 'warning', title: 'Oops', text: t.err_pass_empty, background: '#1c1c2d', color: '#fff'}); 
            }
            if (newPass !== confirmPass) { 
                return Swal.fire({icon: 'error', title: 'Error', text: t.err_pass_match, background: '#1c1c2d', color: '#fff'}); 
            }
            try {
                let adminId = ''; 
                if (token && token.includes('token-rahasia-')) { adminId = token.split('token-rahasia-')[1]; } 
                else { 
                    const adminData = JSON.parse(localStorage.getItem('adminData') || '{}'); 
                    if (adminData.id) { adminId = adminData.id; } 
                    else { const userData = JSON.parse(localStorage.getItem('userData') || '{}'); adminId = userData.id || ''; } 
                }
                
                if (!adminId) { return Swal.fire({icon: 'error', title: 'Akses Ditolak', text: 'ID Admin tidak ditemukan. Silakan Logout dan Login kembali.', background: '#1c1c2d', color: '#fff'}); }
                Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
                
                const res = await fetch('/api/user/change-password', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ userId: adminId, oldPassword: oldPass, newPassword: newPass }) });
                const data = await res.json();
                
                if (res.ok && data.success) { 
                    adminPassModal.hide(); 
                    Swal.fire({ icon: 'success', title: 'Berhasil!', text: t.success_pass, background: '#1c1c2d', color: '#fff' }).then(() => { logout(); }); 
                } else { 
                    Swal.fire({icon: 'error', title: 'Gagal', text: data.message || data.error || 'Password lama salah.', background: '#1c1c2d', color: '#fff'}); 
                }
            } catch (error) { 
                Swal.fire({icon: 'error', title: 'Error', text: 'Koneksi ke server gagal.', background: '#1c1c2d', color: '#fff'}); 
            }
        }
        
        function logout() { 
            localStorage.removeItem('adminToken'); 
            localStorage.removeItem('adminData'); 
            window.location.href = 'login.html'; 
        }
        
        loadTable(); 
        checkMaintenanceStatus(); 
        checkCategory(document.getElementById('category'));
    </script>
</body>
</html>
