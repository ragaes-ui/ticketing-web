<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Penyelenggara | RCELLFEST</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        body { background-color: #0f172a; color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
        .auth-card { background: #1e293b; padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .form-control { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 10px; }
        .form-control:focus { background: rgba(255,255,255,0.05); color: white; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }
        .btn-hijau { background: linear-gradient(135deg, #10b981, #059669); color: white; font-weight: bold; border: none; border-radius: 50px; transition: 0.3s; }
        .btn-hijau:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold mb-0" style="color: #10b981;"><i class="bi bi-briefcase-fill"></i> PARTNER LOGIN</h3>
            <p class="text-muted mt-2 small">Portal Khusus Penyelenggara Event</p>
        </div>

        <form id="organizerLoginForm">
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Email atau Username Admin</label>
                <input type="text" id="logIdentifier" class="form-control" placeholder="admin_event" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Password</label>
                <input type="password" id="logPassword" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="g-recaptcha mb-4 d-flex justify-content-center" data-sitekey="6LdjRpcsAAAAAI_SITE_KEY_KAKAK_DISINI_YAA"></div>

            <button type="submit" id="btnLoginOrg" class="btn btn-hijau w-100 py-2">Masuk ke Dashboard</button>
        </form>

        <div class="mt-4 text-center border-top border-secondary pt-3">
            <p class="text-white-50 small mb-1">Belum punya akun Partner?</p>
            <a href="register-organizer.html" class="text-decoration-none fw-bold" style="color: #10b981;">Daftar Jadi Penyelenggara</a>
        </div>
    </div>

    <script>
        document.getElementById('organizerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLoginOrg');
            const identifier = document.getElementById('logIdentifier').value;
            const password = document.getElementById('logPassword').value;
            const recaptchaToken = grecaptcha.getResponse();

            if (!recaptchaToken) {
                return Swal.fire({ icon: 'warning', title: 'Oops', text: 'Centang reCAPTCHA dulu ya bos!', background: '#1e293b', color: '#fff' });
            }

            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Loading...`;
            btn.disabled = true;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password, recaptchaToken })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    // 👇 FILTER TAMBAHAN: Tolak kalau yang login ternyata pembeli tiket biasa 👇
                    if (data.user.role !== 'organizer' && data.user.role !== 'admin') {
                        grecaptcha.reset();
                        return Swal.fire({ icon: 'error', title: 'Akses Ditolak', text: 'Ini adalah portal khusus Penyelenggara Event. Akun pembeli tiket harap login di halaman utama.', background: '#1e293b', color: '#fff' });
                    }

                    localStorage.setItem('userData', JSON.stringify(data.user));
                    localStorage.setItem('userToken', data.token);
                    
                    Swal.fire({ icon: 'success', title: 'Selamat Datang Partner!', timer: 1500, showConfirmButton: false, background: '#1e293b', color: '#fff' })
                    .then(() => { window.location.href = 'create-event.html'; }); // Langsung lempar ke form buat event
                } else {
                    Swal.fire({ icon: 'error', title: 'Gagal', text: data.message, background: '#1e293b', color: '#fff' });
                    grecaptcha.reset(); 
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Gagal terhubung ke server', background: '#1e293b', color: '#fff' });
                grecaptcha.reset();
            } finally {
                btn.innerHTML = 'Masuk ke Dashboard'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
