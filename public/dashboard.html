<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Saya | RCELLFEST</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* --- 1. CORE VARIABLES --- */
        :root {
            --bg-body: #f0f2f5;
            --bg-nav: rgba(255, 255, 255, 0.85);
            --bg-glass: rgba(255, 255, 255, 0.9);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #0049CC;
            --primary-grad: linear-gradient(135deg, #0049CC 0%, #0072ff 100%);
            --border-glass: 1px solid rgba(0,0,0,0.08);
            --shadow-glass: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius-xl: 24px;
            --radius-md: 16px;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a; /* Solid dark blue-ish gray for performance */
            --bg-nav: rgba(15, 23, 42, 0.8);
            --bg-glass: rgba(30, 41, 59, 0.7);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #3b82f6;
            --primary-grad: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --border-glass: 1px solid rgba(255,255,255,0.08);
            --shadow-glass: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        /* --- 2. GLOBAL STYLES --- */
        body {
            background-color: var(--bg-body);
            /* Background Mesh Gradient (Ringan) */
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            padding-top: 85px;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Scrollbar Halus */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(156, 163, 175, 0.8); }

        /* --- 3. COMPONENTS --- */
        
        /* Navbar Glass */
        .navbar-glass {
            background: var(--bg-nav);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: var(--border-glass);
            padding: 12px 0;
            transition: all 0.3s ease;
        }
        .navbar-brand { font-weight: 800; letter-spacing: -0.5px; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.5rem; }

        /* Cards */
        .card-glass {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: var(--border-glass);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-glass);
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Profile Section */
        .profile-wrapper { display: flex; align-items: center; gap: 20px; }
        .avatar-circle {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: var(--primary-grad);
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.75rem;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
            border: 3px solid rgba(255,255,255,0.1);
        }

        /* Action Buttons */
        .btn-action {
            width: 45px; height: 45px;
            border-radius: 12px;
            display: inline-flex; align-items: center; justify-content: center;
            background: rgba(128,128,128,0.1);
            color: var(--text-main);
            border: 1px solid transparent;
            transition: all 0.2s;
            margin-left: 5px;
        }
        .btn-action:hover { background: var(--primary); color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }

        /* Ticket Item */
        .ticket-item {
            background: rgba(255,255,255,0.03);
            border: var(--border-glass);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
            display: flex; flex-direction: column;
        }
        .ticket-item:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-color: var(--primary); }
        
        .ticket-top {
            padding: 20px;
            background: linear-gradient(to right, rgba(59,130,246,0.1), transparent);
            border-bottom: 1px dashed rgba(128,128,128,0.2);
            position: relative;
        }
        .ticket-top::after {
            content: ''; position: absolute; bottom: -10px; left: -10px; width: 20px; height: 20px;
            background: var(--bg-body); border-radius: 50%;
        }
        .ticket-top::before {
            content: ''; position: absolute; bottom: -10px; right: -10px; width: 20px; height: 20px;
            background: var(--bg-body); border-radius: 50%;
        }

        .ticket-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        .qr-box {
            background: white; padding: 10px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: 15px 0;
            width: 140px; height: 140px;
            display: flex; align-items: center; justify-content: center;
        }
        .qr-box img { width: 100%; height: 100%; object-fit: contain; }

        .btn-glow {
            background: var(--primary-grad); border: none; color: white;
            width: 100%; padding: 10px; border-radius: 12px; font-weight: 600;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); transition: 0.3s;
        }
        .btn-glow:hover { box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6); transform: translateY(-1px); color: white; }

        /* Skeleton Loading Animation */
        .skeleton {
            background: linear-gradient(90deg, rgba(128,128,128,0.1) 25%, rgba(128,128,128,0.2) 50%, rgba(128,128,128,0.1) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Modal Styles */
        .modal-content { background: var(--bg-glass); backdrop-filter: blur(20px); border: var(--border-glass); color: var(--text-main); border-radius: var(--radius-xl); }
        .modal-header { border-bottom: 1px solid rgba(128,128,128,0.1); }
        .modal-footer { border-top: 1px solid rgba(128,128,128,0.1); }
        .form-control {
            background: rgba(128,128,128,0.05); border: 1px solid rgba(128,128,128,0.2);
            color: var(--text-main); border-radius: 12px; padding: 12px;
        }
        .form-control:focus { background: rgba(128,128,128,0.1); border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.2); color: var(--text-main); }

        /* Tab Nav (Untuk Future Dev) */
        .nav-pills .nav-link { color: var(--text-muted); border-radius: 50px; padding: 8px 20px; font-weight: 500; }
        .nav-pills .nav-link.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(59,130,246,0.3); }
        
        [data-theme="dark"] .btn-close { filter: invert(1); }
        .d-none { display: none !important; }
    </style>
</head>
<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        /**
         * RCELLFEST DASHBOARD APP v2.0 (Ultimate)
         * - Modular Pattern for clean code
         * - Includes: Auth Check, Rendering, PDF, Translations, Theme, PIN Logic
         */
        
        // --- CONFIG & STATE ---
        const config = {
            api: {
                tickets: '/api/my-tickets',
                maintenance: '/api/maintenance',
                updatePin: '/api/user/update-pin',
                updateName: '/api/user/update-name'
            },
            lang: localStorage.getItem('lang') || 'id',
            theme: localStorage.getItem('theme') || 'dark'
        };

        const state = {
            user: JSON.parse(localStorage.getItem('userData')),
            tickets: []
        };

        // --- DICTIONARY ---
        const langPack = {
            id: {
                nav_logout: "Keluar", sect_tickets: "Tiket Saya", tab_active: "Aktif", tab_history: "Riwayat",
                btn_buy: "Beli Tiket", empty_title: "Belum ada tiket", empty_desc: "Tiket aktif akan muncul di sini.",
                btn_pdf: "Unduh PDF", btn_copy: "Salin", toast_copy: "Berhasil disalin!", toast_pin_ok: "PIN Disimpan!"
            },
            en: {
                nav_logout: "Logout", sect_tickets: "My Tickets", tab_active: "Active", tab_history: "History",
                btn_buy: "Buy Ticket", empty_title: "No Tickets Found", empty_desc: "Active tickets will appear here.",
                btn_pdf: "Download PDF", btn_copy: "Copy", toast_copy: "Copied!", toast_pin_ok: "PIN Saved!"
            }
        };

        // --- APP CONTROLLER ---
        const app = {
            init: async () => {
                // 1. Auth Check
                if (!state.user) {
                    // Jika testing, uncomment baris bawah untuk dummy user
                    // state.user = { fullName: "Testing User", email: "test@rcell.com" };
                    if(!state.user) window.location.href = 'user-login.html';
                }

                // 2. Setup UI
                document.documentElement.setAttribute('data-theme', config.theme);
                app.updateThemeIcon();
                app.updateLangUI();
                app.renderProfile();

                // 3. Check Maintenance
                await app.checkMaintenance();

                // 4. Load Data
                await app.fetchTickets();
            },

            // --- THEME & LANG ---
            toggleTheme: () => {
                config.theme = config.theme === 'dark' ? 'light' : 'dark';
                localStorage.setItem('theme', config.theme);
                document.documentElement.setAttribute('data-theme', config.theme);
                app.updateThemeIcon();
            },
            updateThemeIcon: () => {
                const icon = document.getElementById('iconTheme');
                if (config.theme === 'dark') {
                    icon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
                    icon.style.color = '#facc15'; // Yellow sun
                } else {
                    icon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
                    icon.style.color = ''; 
                }
            },
            toggleLang: () => {
                config.lang = config.lang === 'id' ? 'en' : 'id';
                localStorage.setItem('lang', config.lang);
                app.updateLangUI();
                app.renderTickets(); // Re-render text tiket
            },
            updateLangUI: () => {
                const t = langPack[config.lang];
                document.getElementById('btnLang').innerText = config.lang.toUpperCase();
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const k = el.getAttribute('data-i18n');
                    if(t[k]) el.innerText = t[k];
                });
            },

            // --- MAINTENANCE ---
            checkMaintenance: async () => {
                try {
                    const res = await fetch(config.api.maintenance);
                    const d = await res.json();
                    if (d.isActive) {
                        document.body.innerHTML = `<div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;background:#0f172a;color:white;text-align:center;">
                            <h1 style="font-size:3rem;">🚧</h1><h2>Maintenance</h2><p>Kami sedang melakukan perbaikan.</p>
                            <button onclick="location.reload()" class="btn btn-primary mt-3">Coba Lagi</button></div>`;
                    }
                } catch(e) {}
            },

            // --- PROFILE LOGIC ---
            renderProfile: () => {
                document.getElementById('txtName').innerText = state.user.fullName || state.user.username;
                document.getElementById('txtEmail').innerText = state.user.email;
            },
            logout: () => {
                Swal.fire({
                    title: 'Keluar?',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: 'Ya',
                    background: getComputedStyle(document.body).getPropertyValue('--bg-glass'),
                    color: getComputedStyle(document.body).getPropertyValue('--text-main')
                }).then((r) => {
                    if (r.isConfirmed) {
                        localStorage.clear();
                        window.location.href = 'user-login.html';
                    }
                });
            },

            // --- TICKET LOGIC ---
            fetchTickets: async () => {
                try {
                    // Gunakan data dummy jika fetch gagal (untuk demo)
                    // Hapus blok catch/dummy di production
                    const res = await fetch(config.api.tickets, {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({email: state.user.email})
                    });
                    if (!res.ok) throw new Error('Network err');
                    state.tickets = await res.json();
                } catch (e) {
                    console.log("Mode Offline / Backend Error. Load Dummy Data.");
                    // Dummy Data untuk Testing Tampilan
                    /* state.tickets = [
                        { eventId: { name: "RCELLFEST 2026", date: "2026-10-20", category: "VIP", location: "GBK Senayan" }, ticketCode: "RCELL-VIP-999", status: "active" },
                        { eventId: { name: "Netflix Premium 1 Bulan", category: "Streaming", description: "Email: a@b.com | Pass: 123" }, ticketCode: "STR-001", status: "active" }
                    ]; */
                } finally {
                    app.renderTickets();
                }
            },

            renderTickets: () => {
                const container = document.getElementById('ticketContainer');
                const empty = document.getElementById('emptyState');
                const t = langPack[config.lang];

                container.innerHTML = ''; // Clear skeleton

                if (!state.tickets || state.tickets.length === 0) {
                    empty.classList.remove('d-none');
                    return;
                }
                empty.classList.add('d-none');

                state.tickets.forEach(ticket => {
                    const evt = ticket.eventId;
                    if(!evt) return;

                    const isStream = (evt.category || '').toLowerCase().includes('stream');
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${ticket.ticketCode}&bgcolor=ffffff`;
                    
                    // Format Date
                    let dStr = "TBA";
                    try { dStr = new Date(evt.date).toLocaleDateString(config.lang === 'id' ? 'id-ID' : 'en-US', { day:'numeric', month:'short', year:'numeric' }); } catch(e){}

                    // Payload PDF
                    const safeDesc = (evt.description || '').replace(/'/g, "\\'");
                    const pdfData = encodeURIComponent(JSON.stringify({
                        name: evt.name, date: dStr, loc: evt.location || 'Online', 
                        code: ticket.ticketCode, user: state.user.fullName, isStream, desc: evt.description 
                    }));

                    // HTML Structure
                    let content = '';
                    if (isStream) {
                        content = `
                            <div class="bg-success bg-opacity-10 p-3 rounded-3 mb-3 w-100 text-start border border-success border-opacity-25">
                                <small class="text-success fw-bold d-block mb-1">AKUN / KREDENSIAL:</small>
                                <div class="font-monospace text-break" style="font-size: 0.9rem;">${evt.description || '-'}</div>
                            </div>
                            <div class="d-flex gap-2 w-100">
                                <button onclick="app.copyText('${safeDesc}')" class="btn btn-outline-primary btn-sm flex-fill rounded-pill"><i class="bi bi-copy"></i> ${t.btn_copy}</button>
                                <button onclick="app.genPDF('${pdfData}')" class="btn btn-primary btn-sm flex-fill rounded-pill"><i class="bi bi-download"></i> PDF</button>
                            </div>
                        `;
                    } else {
                        content = `
                            <div class="qr-box mx-auto">
                                <img src="${qrUrl}" alt="QR Code" loading="lazy">
                            </div>
                            <small class="text-muted mb-3 d-block font-monospace tracking-wider">${ticket.ticketCode}</small>
                            <button onclick="app.genPDF('${pdfData}')" class="btn btn-glow w-100">
                                <i class="bi bi-ticket-detailed me-2"></i> ${t.btn_pdf}
                            </button>
                        `;
                    }

                    const card = document.createElement('div');
                    card.className = 'col-md-6 col-lg-4';
                    card.innerHTML = `
                        <div class="ticket-item">
                            <div class="ticket-top">
                                <h5 class="fw-bold mb-1 text-truncate">${evt.name}</h5>
                                <div class="d-flex justify-content-between small text-muted">
                                    <span><i class="bi bi-calendar-event me-1"></i> ${dStr}</span>
                                    <span class="badge bg-primary bg-opacity-10 text-primary">${evt.category || 'General'}</span>
                                </div>
                            </div>
                            <div class="ticket-content">
                                ${content}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            },

            // --- UTILS ---
            copyText: (txt) => {
                navigator.clipboard.writeText(txt);
                const t = langPack[config.lang];
                Swal.fire({ toast: true, position: 'top', icon: 'success', title: t.toast_copy, showConfirmButton: false, timer: 1500 });
            },

            genPDF: async (dataStr) => {
                const d = JSON.parse(decodeURIComponent(dataStr));
                Swal.fire({ title: 'Generating PDF...', didOpen: () => Swal.showLoading(), background: 'transparent', color: '#fff', allowOutsideClick: false });

                const el = document.createElement('div');
                document.body.appendChild(el);
                // Hidden Render Area
                el.style.cssText = 'position:fixed; top:0; left:0; width:400px; z-index:-99; background:white; color:black; padding:20px; font-family:sans-serif;';
                
                // PDF Template HTML
                const qrImg = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${d.code}&bgcolor=ffffff`;
                let centerContent = d.isStream 
                    ? `<div style="background:#eee; padding:10px; margin:20px 0; font-family:monospace; word-break:break-all;">${d.desc}</div>`
                    : `<img src="${qrImg}" style="width:150px; display:block; margin:20px auto;">`;

                el.innerHTML = `
                    <div style="border:2px solid #0049CC; padding:20px; text-align:center;">
                        <h2 style="color:#0049CC; margin:0;">RCELLFEST</h2>
                        <p style="color:#666; font-size:12px; margin-bottom:20px;">E-TICKET / VOUCHER</p>
                        <h1 style="font-size:18px; margin:10px 0;">${d.name}</h1>
                        <p style="font-size:12px;">${d.date} | ${d.loc}</p>
                        ${centerContent}
                        <div style="background:#0049CC; color:white; padding:5px; margin-top:20px; font-weight:bold; letter-spacing:2px;">${d.code}</div>
                        <p style="font-size:10px; color:#999; margin-top:10px;">Holder: ${d.user}</p>
                    </div>
                `;

                // Wait image load
                const imgs = el.querySelectorAll('img');
                await Promise.all(Array.from(imgs).map(img => new Promise(r => { if(img.complete) r(); else img.onload = img.onerror = r; })));
                await new Promise(r => setTimeout(r, 800)); // Safety delay

                const opt = { margin: 10, filename: `Tiket-${d.code}.pdf`, image: {type:'jpeg', quality:0.98}, html2canvas: {scale:2, useCORS:true}, jsPDF: {unit:'mm', format:'a5'} };
                await html2pdf().set(opt).from(el).save();
                
                document.body.removeChild(el);
                Swal.close();
            },

            // --- USER SETTINGS ACTIONS ---
            saveName: async () => {
                const val = document.getElementById('inpName').value;
                if(!val) return;
                state.user.fullName = val; 
                localStorage.setItem('userData', JSON.stringify(state.user));
                app.renderProfile();
                modals.name.hide();
                Swal.fire('Sukses', 'Nama diubah', 'success');
            },
            savePass: () => {
                modals.pass.hide();
                Swal.fire('Sukses', 'Password diubah. Login ulang.', 'success').then(() => app.logout());
            },
            savePin: async () => {
                const p1 = document.getElementById('pin1').value;
                const p2 = document.getElementById('pin2').value;
                if(p1.length !== 6 || p1 !== p2) {
                    Swal.fire('Error', 'PIN harus 6 angka & sama', 'error');
                    return;
                }
                const btn = document.getElementById('btnSavePin');
                const oldTxt = btn.innerText;
                btn.innerText = 'Loading...'; btn.disabled = true;

                // Simulasi API Delay
                await new Promise(r => setTimeout(r, 1000));
                
                // Jika pakai API Asli:
                // await fetch(config.api.updatePin, { method: 'POST', body: ... });

                modals.pin.hide();
                const t = langPack[config.lang];
                Swal.fire({icon: 'success', title: t.toast_pin_ok, showConfirmButton: false, timer: 1500});
                
                btn.innerText = oldTxt; btn.disabled = false;
            }
        };

        // --- MODAL HANDLERS ---
        const modals = {
            name: new bootstrap.Modal(document.getElementById('modalName')),
            pass: new bootstrap.Modal(document.getElementById('modalPass')),
            pin: new bootstrap.Modal(document.getElementById('modalPin'))
        };

        // --- START APP ---
        document.addEventListener('DOMContentLoaded', app.init);

    </script>
</body>
</html>
